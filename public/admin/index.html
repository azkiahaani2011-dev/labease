async function loadBookingsFromSupabase() {
  if (!sb) return null;
  try {
    var res = await sb.from('bookings').select('*').order('created_at', {ascending: false});
    if (res.error) return null;
    return res.data.map(function(b) {
      var items = b.items || [];
      return {
        id: b.id,
        patient: b.patient_name,
        phone: b.patient_phone,
        test: items.length ? items.map(function(i){return i.name;}).join(', ') : '—',
        lab: b.lab_name || '—',
        date: b.slot_date || b.created_at.slice(0,10),
        mode: b.collection === 'home' ? 'Home' : 'Clinic',
        amount: b.total,
        status: b.status.charAt(0).toUpperCase() + b.status.slice(1),
        raw: b,
      };
    });
  } catch(e) { return null; }
}

async function updateBookingStatusInSupabase(id, status) {
  if (!sb) return false;
  try {
    var res = await sb.from('bookings').update({status: status.toLowerCase()}).eq('id', id);
    return !res.error;
  } catch(e) { return false; }
}

function genBookings() {
  const saved = localStorage.getItem('le_bookings');
  if (saved) return JSON.parse(saved);
  const prices = {'CBC':299,'Lipid Profile':599,'Thyroid Profile':799,'HbA1c':499,'Vitamin D':899,'LFT':799,'KFT':699,'Urine Routine':199,'Full Body Checkup':1999,'Dengue NS1':699};
  const data = [];
  for (let i = 0; i < 28; i++) {
    const t = TEST_NAMES[i % 10];
    const d = new Date(2024, 3 + Math.floor(i/5), (i % 27) + 1);
    data.push({
      id: 'LB' + (1000 + i),
      patient: PATIENTS[i % 10],
      phone: PHONES[i % 10],
      test: t,
      lab: LAB_NAMES[i % 6],
      date: d.toISOString().slice(0,10),
      mode: MODES[i % 2],
      amount: prices[t],
      status: STATUSES[i % 5],
    });
  }
  localStorage.setItem('le_bookings', JSON.stringify(data));
  return data;
}

function genTests() {
  // Apply any saved price overrides from admin
  var overrides = {};
  try { overrides = JSON.parse(localStorage.getItem('le_price_overrides') || '{}'); } catch(e){}
  return ALL_LAB_TESTS.map(function(t) {
    var ov = overrides[t.id] || {};
    return Object.assign({}, t, {
      price: ov.price !== undefined ? ov.price : t.price,
      mrp:   ov.mrp   !== undefined ? ov.mrp   : t.mrp,
    });
  });
}

function Dashboard(props) {
  const bookings = props.bookings;
  const total = bookings.length;
  const active = bookings.filter(function(b){return b.status==='Confirmed'||b.status==='Sample Collected';}).length;
  const revenue = bookings.filter(function(b){return b.status!=='Cancelled';}).reduce(function(s,b){return s+b.amount;},0);
  const today = todayStr();
  const todayRev = bookings.filter(function(b){return b.date===today&&b.status!=='Cancelled';}).reduce(function(s,b){return s+b.amount;},0);
  const weekRev = bookings.filter(function(b){return b.date>=weekAgoStr()&&b.status!=='Cancelled';}).reduce(function(s,b){return s+b.amount;},0);
  const monthStart = new Date(); monthStart.setDate(1);
  const msStr = monthStart.toISOString().slice(0,10);
  const monthRev = bookings.filter(function(b){return b.date>=msStr&&b.status!=='Cancelled';}).reduce(function(s,b){return s+b.amount;},0);
  const statusCounts = {};
  STATUSES.forEach(function(s){statusCounts[s]=bookings.filter(function(b){return b.status===s;}).length;});
  const testCount = {};
  bookings.forEach(function(b){testCount[b.test]=(testCount[b.test]||0)+1;});
  const topTests = Object.entries(testCount).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  const maxT = topTests.length > 0 ? topTests[0][1] : 1;
  const recent = bookings.slice().sort(function(a,b){return b.id.localeCompare(a.id);}).slice(0,6);
  const statusColors = {'Confirmed':'#3B82F6','Sample Collected':'#F59E0B','Report Ready':'#10B981','Pending':'#9CA3AF','Cancelled':'#EF4444'};
  const stats = [
    {label:'Total Bookings',value:total,bg:'#EFF6FF',emoji:'📋'},
    {label:'Active Bookings',value:active,bg:'#F0FDF4',emoji:'✅'},
    {label:"Today's Revenue",value:fmt(todayRev),bg:'#FFF7ED',emoji:'📅'},
    {label:'This Week',value:fmt(weekRev),bg:'#FDF4FF',emoji:'📊'},
    {label:'This Month',value:fmt(monthRev),bg:'#F0FDF4',emoji:'📈'},
    {label:'Total Revenue',value:fmt(revenue),bg:'#FFF7ED',emoji:'💰'},
    {label:'Total Labs',value:LAB_NAMES.length,bg:'#EFF6FF',emoji:'🏥'},
  ];
  return (
    <div style={{padding:28}}>
      <div style={{fontSize:22,fontWeight:800,marginBottom:6,color:'#0D1117'}}>Dashboard</div>
      <div style={{fontSize:13.5,color:'#6B7280',marginBottom:24}}>Welcome back, Admin. Here's what's happening today.</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24,gridAutoRows:'auto'}}>
        {stats.map(function(s) {
          return (
            <div key={s.label} className="card" style={{padding:20}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontSize:12,color:'#6B7280',fontWeight:600,marginBottom:6}}>{s.label}</div>
                  <div style={{fontSize:26,fontWeight:800,color:'#0D1117'}}>{s.value}</div>
                </div>
                <div style={{width:44,height:44,borderRadius:12,background:s.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{s.emoji}</div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
        <div className="card" style={{padding:22}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:18,color:'#0D1117'}}>Booking Status Breakdown</div>
          {STATUSES.map(function(s) {
            return (
              <div key={s} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:500,marginBottom:5}}>
                  <span>{s}</span><span style={{color:'#6B7280'}}>{statusCounts[s]}</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:((statusCounts[s]/total)*100)+'%',background:statusColors[s]}} />
                </div>
              </div>
            );
          })}
        </div>
        <div className="card" style={{padding:22}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:18,color:'#0D1117'}}>Top 5 Booked Tests</div>
          {topTests.map(function(entry, i) {
            var name = entry[0]; var cnt = entry[1];
            return (
              <div key={name} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:500,marginBottom:5}}>
                  <span>{(i+1)+'. '+name}</span><span style={{color:'#6B7280'}}>{cnt} bookings</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:((cnt/maxT)*100)+'%',background:'#1158A6'}} />
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="card">
        <div style={{padding:'18px 20px 0',fontWeight:700,fontSize:15,color:'#0D1117'}}>Recent Bookings</div>
        <table>
          <thead>
            <tr><th>ID</th><th>Patient</th><th>Test</th><th>Lab</th><th>Date</th><th>Amount</th><th>Status</th></tr>
          </thead>
          <tbody>
            {recent.map(function(b) {
              return (
                <tr key={b.id}>
                  <td style={{fontWeight:600,color:'#1158A6'}}>{b.id}</td>
                  <td>{b.patient}</td>
                  <td>{b.test}</td>
                  <td>{b.lab}</td>
                  <td>{b.date}</td>
                  <td style={{fontWeight:600}}>{fmt(b.amount)}</td>
                  <td><span className={statusBadgeClass(b.status)}>{b.status}</span></td>

function Bookings(props) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('All');
  function downloadExcel(rows) {
    var data = rows.map(function(b) {
      return {
        'Booking ID': b.id,
        'Patient Name': b.patient,
        'Phone': b.phone,
        'Test': b.test,
        'Lab': b.lab,
        'Date': b.date,
        'Mode': b.mode,
        'Amount (₹)': b.amount,
        'Status': b.status,
      };
    });
    var ws = XLSX.utils.json_to_sheet(data);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Bookings');
    XLSX.writeFile(wb, 'LabEase_Bookings_' + new Date().toISOString().slice(0,10) + '.xlsx');
  }
  function updateStatus(id, status) {
    var next = props.bookings.map(function(b){return b.id===id?Object.assign({},b,{status:status}):b;});
    props.setBookings(next);
    localStorage.setItem('le_bookings', JSON.stringify(next));
    updateBookingStatusInSupabase(id, status); // sync to Supabase
  }
  var filtered = props.bookings.filter(function(b) {
    var q = search.toLowerCase();
    var matchQ = !q || b.patient.toLowerCase().indexOf(q)>-1 || b.id.toLowerCase().indexOf(q)>-1 || b.test.toLowerCase().indexOf(q)>-1;
    var matchF = filter==='All' || b.status===filter;
    return matchQ && matchF;
  }).sort(function(a,b){ return b.id.localeCompare(a.id); });
  return (
    <div style={{padding:28}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:800,color:'#0D1117'}}>Bookings</div>
        <button className="btn btn-outline" onClick={function(){downloadExcel(filtered);}}>
          {React.createElement(IconDownload,null)} Download Excel
        </button>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{position:'relative',flex:'1',minWidth:220}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#9CA3AF'}}>{React.createElement(IconSearch,null)}</span>
          <input type="text" style={{width:'100%',paddingLeft:32}} placeholder="Search by name, ID or test…" value={search} onChange={function(e){setSearch(e.target.value);}} />
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['All'].concat(STATUSES).map(function(s) {
            return <button key={s} className={'pill-btn'+(filter===s?' active':'')} onClick={function(){setFilter(s);}}>{s}</button>;
          })}
        </div>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table>
            <thead>
              <tr><th>ID</th><th>Patient</th><th>Phone</th><th>Test</th><th>Lab</th><th>Date</th><th>Mode</th><th>Amount</th><th>Status</th><th>Update Status</th></tr>
            </thead>
            <tbody>
              {filtered.length === 0 && (
                <tr><td colSpan={10} style={{textAlign:'center',color:'#9CA3AF',padding:32}}>No bookings found.</td></tr>
              )}
              {filtered.map(function(b) {
                return (
                  <tr key={b.id}>
                    <td style={{fontWeight:600,color:'#1158A6'}}>{b.id}</td>
                    <td style={{fontWeight:600}}>{b.patient}</td>
                    <td style={{color:'#6B7280'}}>{b.phone}</td>
                    <td>{b.test}</td>
                    <td>{b.lab}</td>
                    <td>{b.date}</td>
                    <td>
                      <span style={{fontSize:12,fontWeight:600,color:b.mode==='Home'?'#7E22CE':'#0369A1',background:b.mode==='Home'?'#FDF4FF':'#F0F9FF',padding:'3px 8px',borderRadius:6}}>{b.mode}</span>
                    </td>
                    <td style={{fontWeight:700}}>{fmt(b.amount)}</td>
                    <td><span className={statusBadgeClass(b.status)}>{b.status}</span></td>
                    <td>
                      <select value={b.status} onChange={function(e){updateStatus(b.id,e.target.value);}} style={{fontSize:12,padding:'5px 8px'}}>
                        {STATUSES.map(function(s){return <option key={s} value={s}>{s}</option>;})}
                      </select>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{padding:'12px 20px',fontSize:12,color:'#9CA3AF',borderTop:'1px solid #F3F4F6'}}>
          Showing {filtered.length} of {props.bookings.length} bookings
        </div>
      </div>
    </div>
  );
}

function Labs(props) {
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [editTests, setEditTests] = useState([]);
  const [addingLab, setAddingLab] = useState(false);
  const [newLab, setNewLab] = useState({name:'',city:'',phone:'',rating:'4.5',address:'',timing:'',reportTime:'Same Day',homeCollection:false,nabl:false,logoBase64:'',color:'#1158A6'});
  const [newLabTests, setNewLabTests] = useState([{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]);
  function startEdit(lab) {
    setEditing(lab.id);
    setForm({name:lab.name,city:lab.city||'',phone:lab.phone||'',rating:lab.rating||'4.5',address:lab.address||'',timing:lab.timing||'',homeCollection:!!lab.homeCollection,nabl:!!lab.nabl,color:lab.color||'#1158A6',logoBase64:lab.logoBase64||''});
    var tests = Array.isArray(lab.tests) ? lab.tests.map(function(t){return {name:t.name,price:t.price,mrp:t.mrp,cat:t.cat||'General',time:t.time||'Same Day'};}) : [];
    setEditTests(tests.length ? tests : [{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]);
  }
  function saveEdit(id) {
    var testsArr = editTests.filter(function(t){return t.name&&t.name.trim();}).map(function(t,i){return {id:'x'+id+'_'+i,name:t.name.trim(),price:parseFloat(t.price)||0,mrp:parseFloat(t.mrp)||parseFloat(t.price)||0,cat:t.cat||'General',time:t.time||'Same Day'};});
    var next = props.labs.map(function(l){return l.id===id?Object.assign({},l,form,{rating:parseFloat(form.rating)||4.5,tests:testsArr.length?testsArr:l.tests}):l;});
    props.setLabs(next); localStorage.setItem('le_labs',JSON.stringify(next));
    // update extra_labs too
    var extras=[];try{extras=JSON.parse(localStorage.getItem('le_extra_labs')||'[]');}catch(e){}
    var updated=next.find(function(l){return l.id===id;});
    var knownIds=new Set([1,2,3,4,5,6]);
    if(!knownIds.has(id)&&updated){extras=extras.map(function(e){return e.id===id?updated:e;});localStorage.setItem('le_extra_labs',JSON.stringify(extras));}
    // lab name override for original labs
    var lnov={};try{lnov=JSON.parse(localStorage.getItem('le_lab_name_overrides')||'{}');}catch(e){}
    lnov[id]=form.name; localStorage.setItem('le_lab_name_overrides',JSON.stringify(lnov));
    setEditing(null);
  }
  function toggle(id) {
    var next = props.labs.map(function(l){return l.id===id?Object.assign({},l,{active:!l.active}):l;});
    props.setLabs(next);
    localStorage.setItem('le_labs', JSON.stringify(next));
    var toggled = next.find(function(l){return l.id===id;});
    if (toggled) {
      var labOv = {};
      try { labOv = JSON.parse(localStorage.getItem('le_lab_overrides')||'{}'); } catch(e){}
      labOv[id] = toggled.active;
      localStorage.setItem('le_lab_overrides', JSON.stringify(labOv));
    }
  }
  function saveNewLab() {
    if (!newLab.name.trim()) return;
    var maxId = props.labs.reduce(function(m,l){return Math.max(m,l.id);},0);
    var labId = maxId+1;
    var testsArr = newLabTests.filter(function(t){return t.name.trim();}).map(function(t,i){return {id:'x'+labId+'_'+i,name:t.name.trim(),price:parseFloat(t.price)||199,mrp:parseFloat(t.mrp)||parseFloat(t.price)||199,cat:t.cat||'General',time:t.time||'Same Day'};});
    if(testsArr.length===0) testsArr=[{id:'x'+labId+'_0',name:'Consultation',price:199,mrp:499,cat:'General',time:'Same Day'}];
    var lab = {id:labId,name:newLab.name.trim(),city:newLab.city.trim(),address:newLab.address.trim()||newLab.city.trim(),phone:newLab.phone.trim(),rating:parseFloat(newLab.rating)||4.5,reviews:0,timing:newLab.timing.trim()||'6:00 AM – 10:00 PM',reportTime:newLab.reportTime||'Same Day',homeCollection:newLab.homeCollection,nabl:newLab.nabl,color:newLab.color||'#1158A6',logoBase64:newLab.logoBase64||'',tests:testsArr,active:true,distance:'—',founded:new Date().getFullYear().toString()};
    var next = props.labs.concat([lab]);
    props.setLabs(next);
    localStorage.setItem('le_labs', JSON.stringify(next));
    var extras = [];
    try { extras = JSON.parse(localStorage.getItem('le_extra_labs')||'[]'); } catch(e){}
    extras.push(lab);
    localStorage.setItem('le_extra_labs', JSON.stringify(extras));
    setNewLab({name:'',city:'',phone:'',rating:'4.5',address:'',timing:'',reportTime:'Same Day',homeCollection:false,nabl:false,logoBase64:'',color:'#1158A6'});
    setNewLabTests([{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]);
    setAddingLab(false);
  }
  var fields = [['name','Name'],['city','City'],['phone','Phone'],['rating','Rating'],['tests','Tests Count']];
  return (
    <div style={{padding:28}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:800,color:'#0D1117'}}>Labs</div>
        <button className="btn btn-primary" onClick={function(){setAddingLab(!addingLab);}}>+ Add Lab</button>
      </div>
      {addingLab && (
        <div className="card" style={{padding:20,marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:14,color:'#0D1117'}}>Add New Lab</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:14}}>
            {[['name','Lab Name'],['city','City'],['phone','Phone'],['rating','Rating'],['address','Address'],['timing','Timing (e.g. 6:00 AM – 10:00 PM)'],['color','Button Color']].map(function(pair){
              var k=pair[0]; var lbl=pair[1];
              return (
                <div key={k}>
                  <label style={{fontSize:11,fontWeight:600,color:'#6B7280',display:'block',marginBottom:3}}>{lbl}</label>
                  <input type="text" style={{width:'100%'}} value={newLab[k]} onChange={function(e){var v=e.target.value;setNewLab(function(f){var n=Object.assign({},f);n[k]=v;return n;});}} />
                </div>
              );
            })}
            <div>
              <label style={{fontSize:11,fontWeight:600,color:'#6B7280',display:'block',marginBottom:3}}>Logo (upload image)</label>
              <input type="file" accept="image/*" style={{width:'100%',fontSize:12}} onChange={function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){setNewLab(function(f){return Object.assign({},f,{logoBase64:ev.target.result});});};reader.readAsDataURL(file);}} />
              {newLab.logoBase64 && <img src={newLab.logoBase64} alt="preview" style={{width:48,height:48,objectFit:'contain',marginTop:4,borderRadius:6,border:'1px solid #E5E7EB'}} />}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <input type="checkbox" id="nl-hc" checked={newLab.homeCollection} onChange={function(e){var v=e.target.checked;setNewLab(function(f){var n=Object.assign({},f);n.homeCollection=v;return n;});}} />
              <label htmlFor="nl-hc" style={{fontSize:13,fontWeight:600,color:'#374151'}}>Home Collection</label>

          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:4}}>Tests / Packages</div>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr auto',gap:8,marginBottom:3}}>

              <div key={i} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr auto',gap:8,marginBottom:6,alignItems:'center'}}>
                <input type="text" placeholder="e.g. CBC" style={{width:'100%'}} value={t.name} onChange={function(e){var v=e.target.value;setNewLabTests(function(arr){var n=arr.slice();n[i]=Object.assign({},n[i],{name:v});return n;});}} />
                <input type="number" placeholder="0" style={{width:'100%'}} value={t.price} onChange={function(e){var v=e.target.value;setNewLabTests(function(arr){var n=arr.slice();n[i]=Object.assign({},n[i],{price:v});return n;});}} />
                <input type="number" placeholder="0" style={{width:'100%'}} value={t.mrp} onChange={function(e){var v=e.target.value;setNewLabTests(function(arr){var n=arr.slice();n[i]=Object.assign({},n[i],{mrp:v});return n;});}} />
                <select style={{width:'100%',height:32,borderRadius:6,border:'1px solid #D1D5DB',fontSize:12,padding:'0 4px'}} value={t.cat} onChange={function(e){var v=e.target.value;setNewLabTests(function(arr){var n=arr.slice();n[i]=Object.assign({},n[i],{cat:v});return n;});}}>
                  {['Blood','Thyroid','Diabetes','Liver','Kidney','Vitamins','Cardiac','Packages','Radiology','Hormones','Infectious','COVID','Allergy','Autoimmune','Cancer Markers','Urine','General'].map(function(c){return <option key={c} value={c}>{c}</option>;})}
                </select>
                <button style={{background:'#FEE2E2',color:'#DC2626',border:'none',borderRadius:6,padding:'4px 8px',cursor:'pointer',fontWeight:700,fontSize:13}} onClick={function(){setNewLabTests(function(arr){return arr.filter(function(_,j){return j!==i;});});}}>✕</button>
              </div>
            );})}
            <button className="btn btn-outline btn-sm" onClick={function(){setNewLabTests(function(arr){return arr.concat([{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]);});}}>+ Add Test</button>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={saveNewLab}>Save Lab</button>
            <button className="btn btn-outline btn-sm" onClick={function(){setAddingLab(false);}}>Cancel</button>
          </div>
        </div>
      )}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:18}}>
        {props.labs.map(function(lab) {
          return (
            <div key={lab.id} className="lab-card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:15,color:'#0D1117',flex:1,paddingRight:8}}>{lab.name}</div>
                <span className={'badge '+(lab.active?'badge-green':'badge-red')} style={{flexShrink:0}}>{lab.active?'Active':'Inactive'}</span>
              </div>
              {editing === lab.id ? (
                <div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                    {[['name','Lab Name'],['city','City'],['phone','Phone'],['rating','Rating'],['address','Address'],['timing','Timing'],['color','Button Color']].map(function(pair){
                      var k=pair[0];var lbl=pair[1];
                      return (
                        <div key={k}>
                          <label style={{fontSize:10,fontWeight:600,color:'#6B7280',display:'block',marginBottom:2}}>{lbl}</label>
                          <input type="text" style={{width:'100%'}} value={form[k]||''} onChange={function(e){var v=e.target.value;setForm(function(f){var n=Object.assign({},f);n[k]=v;return n;});}} />
                        </div>
                      );
                    })}
                    <div>
                      <label style={{fontSize:10,fontWeight:600,color:'#6B7280',display:'block',marginBottom:2}}>Logo (upload)</label>
                      <input type="file" accept="image/*" style={{width:'100%',fontSize:11}} onChange={function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){setForm(function(f){return Object.assign({},f,{logoBase64:ev.target.result});});};reader.readAsDataURL(file);}} />
                      {form.logoBase64 && <img src={form.logoBase64} alt="logo" style={{width:36,height:36,objectFit:'contain',marginTop:3,borderRadius:4,border:'1px solid #E5E7EB'}} />}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:16,marginBottom:8}}>
                    <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,cursor:'pointer'}}>
                      <input type="checkbox" checked={!!form.homeCollection} onChange={function(e){var v=e.target.checked;setForm(function(f){return Object.assign({},f,{homeCollection:v});});}} /> Home Collection
                    </label>
                    <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,cursor:'pointer'}}>
                      <input type="checkbox" checked={!!form.nabl} onChange={function(e){var v=e.target.checked;setForm(function(f){return Object.assign({},f,{nabl:v});});}} /> NABL Accredited
                    </label>
                  </div>
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:11,fontWeight:700,color:'#374151',marginBottom:4}}>Tests / Packages</div>
                    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr auto',gap:6,marginBottom:3}}>
                      <span style={{fontSize:10,fontWeight:600,color:'#9CA3AF'}}>Test Name</span>
                      <span style={{fontSize:10,fontWeight:600,color:'#9CA3AF'}}>Price (₹)</span>
                      <span style={{fontSize:10,fontWeight:600,color:'#9CA3AF'}}>MRP (₹)</span>
                      <span style={{fontSize:10,fontWeight:600,color:'#9CA3AF'}}>Category</span>
                      <span/>
                    </div>
                    {editTests.map(function(t,i){return (
                      <div key={i} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr auto',gap:6,marginBottom:5,alignItems:'center'}}>
                        <input type="text" placeholder="e.g. CBC" style={{width:'100%'}} value={t.name} onChange={function(e){var v=e.target.value;setEditTests(function(arr){var n=arr.slice();n[i]=Object.assign({},n[i],{name:v});return n;});}} />
                        <input type="number" placeholder="0" style={{width:'100%'}} value={t.price} onChange={function(e){var v=e.target.value;setEditTests(function(arr){var n=arr.slice();n[i]=Object.assign({},n[i],{price:v});return n;});}} />
                        <input type="number" placeholder="0" style={{width:'100%'}} value={t.mrp} onChange={function(e){var v=e.target.value;setEditTests(function(arr){var n=arr.slice();n[i]=Object.assign({},n[i],{mrp:v});return n;});}} />
                        <select style={{width:'100%',height:32,borderRadius:6,border:'1px solid #D1D5DB',fontSize:12,padding:'0 4px'}} value={t.cat} onChange={function(e){var v=e.target.value;setEditTests(function(arr){var n=arr.slice();n[i]=Object.assign({},n[i],{cat:v});return n;});}}>
                          {['Blood','Thyroid','Diabetes','Liver','Kidney','Vitamins','Cardiac','Packages','Radiology','Hormones','Infectious','COVID','Allergy','Autoimmune','Cancer Markers','Urine','General'].map(function(c){return <option key={c} value={c}>{c}</option>;})}
                        </select>
                        <button style={{background:'#FEE2E2',color:'#DC2626',border:'none',borderRadius:5,padding:'3px 7px',cursor:'pointer',fontWeight:700,fontSize:12}} onClick={function(){setEditTests(function(arr){return arr.filter(function(_,j){return j!==i;});});}}>✕</button>
                      </div>
                    );})}
                    <button className="btn btn-outline btn-sm" onClick={function(){setEditTests(function(arr){return arr.concat([{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]);});}}>+ Add Test</button>
                  </div>
                  <div style={{display:'flex',gap:8,marginTop:10}}>
                    <button className="btn btn-primary btn-sm" onClick={function(){saveEdit(lab.id);}}>Save</button>
                    <button className="btn btn-outline btn-sm" onClick={function(){setEditing(null);}}>Cancel</button>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{color:'#6B7280',fontSize:13,marginBottom:4}}>📍 {lab.city}</div>
                  <div style={{color:'#6B7280',fontSize:13,marginBottom:4}}>📞 {lab.phone}</div>
                  <div style={{display:'flex',gap:16,marginBottom:14,marginTop:10}}>
                    <div style={{fontSize:13}}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" strokeWidth="1" style={{verticalAlign:'middle'}}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                      {' '}<span style={{fontWeight:600}}>{lab.rating}</span> <span style={{color:'#9CA3AF'}}>rating</span>
                    </div>
                    <div style={{fontSize:13,color:'#6B7280'}}><strong style={{color:'#0D1117'}}>{Array.isArray(lab.tests)?lab.tests.length:lab.tests}</strong> tests</div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn btn-outline btn-sm" onClick={function(){startEdit(lab);}}>
                      {React.createElement(IconEdit,null)} Edit
                    </button>
                    <button className="btn btn-sm" onClick={function(){toggle(lab.id);}} style={{background:lab.active?'#FEF2F2':'#F0FDF4',color:lab.active?'#DC2626':'#15803D',border:'none',fontWeight:600}}>
                      {lab.active?'Deactivate':'Activate'}
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Tests(props) {
  const [search, setSearch] = useState('');
  const [labFilter, setLabFilter] = useState('All');
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});

  var labNames = ['All','Apollo','SRL','Metropolis','Dr Lal','Thyrocare','Vijaya'];

  function startEdit(t) { setEditing(t.id); setForm({mrp:t.mrp, price:t.price, name:t.name}); }
  function saveEdit(id) {
    var newPrice = parseInt(form.price);
    var newMrp   = parseInt(form.mrp);
    var newName  = form.name;
    // Update local test list
    var next = props.tests.map(function(t){ return t.id===id ? Object.assign({},t,{price:newPrice,mrp:newMrp,name:newName}) : t; });
    props.setTests(next);
    // Write to le_price_overrides so main UI picks it up
    var ov = {};
    try { ov = JSON.parse(localStorage.getItem('le_price_overrides')||'{}'); } catch(e){}
    ov[id] = {price:newPrice, mrp:newMrp};
    localStorage.setItem('le_price_overrides', JSON.stringify(ov));
    // Sync price override to Supabase
    if (sb) { sb.from('price_overrides').upsert({test_id: id, price: newPrice}).then(function(){}); }
    // Write to le_test_name_overrides so main UI picks up name change
    var tnov = {};
    try { tnov = JSON.parse(localStorage.getItem('le_test_name_overrides')||'{}'); } catch(e){}
    tnov[id] = newName;
    localStorage.setItem('le_test_name_overrides', JSON.stringify(tnov));
    setEditing(null);
  }

  var filtered = props.tests.filter(function(t) {
    var mq = !search || t.name.toLowerCase().indexOf(search.toLowerCase())>-1 || t.cat.toLowerCase().indexOf(search.toLowerCase())>-1;
    var ml = labFilter==='All' || t.lab===labFilter;
    return mq && ml;
  });

  return (
    <div style={{padding:28}}>
      <div style={{fontSize:22,fontWeight:800,marginBottom:6,color:'#0D1117'}}>Tests & Pricing</div>
      <div style={{color:'#6B7280',fontSize:13,marginBottom:20}}>Edit prices per lab — changes reflect instantly in the main app</div>
      <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{position:'relative',width:280}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#9CA3AF'}}>{React.createElement(IconSearch,null)}</span>
          <input type="text" style={{width:'100%',paddingLeft:32}} placeholder="Search test or category…" value={search} onChange={function(e){setSearch(e.target.value);}} />
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {labNames.map(function(l) {
            return React.createElement('button', {
              key:l, className:'btn '+(labFilter===l?'btn-primary':'btn-outline')+' btn-sm',
              onClick:function(){setLabFilter(l);}
            }, l);
          })}
        </div>
      </div>
      <div style={{color:'#6B7280',fontSize:12,marginBottom:10}}>{filtered.length} entries</div>
      <div className="card" style={{overflow:'hidden'}}>
        <table>
          <thead>
            <tr><th>Test Name</th><th>Lab</th><th>Category</th><th>MRP</th><th>Offer Price</th><th>Discount</th><th>Action</th></tr>
          </thead>
          <tbody>
            {filtered.map(function(t) {
              var disc = Math.round((1 - t.price/t.mrp)*100);
              return (
                <tr key={t.id}>
                  <td style={{fontWeight:600,maxWidth:180}}>{t.name}</td>
                  <td>
                    <span style={{fontSize:12,background:'#EFF6FF',color:'#1158A6',padding:'3px 8px',borderRadius:6,fontWeight:600,whiteSpace:'nowrap'}}>{t.lab}</span>
                  </td>
                  <td><span style={{fontSize:12,background:'#F3F4F6',color:'#374151',padding:'3px 8px',borderRadius:6,fontWeight:600}}>{t.cat}</span></td>
                  <td style={{color:'#9CA3AF',textDecoration:'line-through'}}>{fmt(t.mrp)}</td>
                  <td style={{fontWeight:700,color:'#15803D'}}>{fmt(t.price)}</td>
                  <td><span style={{background:'#FFF7ED',color:'#C2410C',fontSize:12,fontWeight:700,padding:'3px 8px',borderRadius:6}}>{disc}% off</span></td>
                  <td>
                    {editing === t.id ? (
                      <div style={{display:'flex',gap:6,alignItems:'flex-end',flexWrap:'wrap'}}>
                        <div>
                          <div style={{fontSize:11,color:'#9CA3AF',marginBottom:2}}>Test Name</div>
                          <input type="text" style={{width:160,padding:'4px 8px',fontSize:12}} value={form.name} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{name:v});});}} />
                        </div>
                        <div>
                          <div style={{fontSize:11,color:'#9CA3AF',marginBottom:2}}>MRP</div>
                          <input type="number" style={{width:76,padding:'4px 8px',fontSize:12}} value={form.mrp} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{mrp:v});});}} />
                        </div>
                        <div>
                          <div style={{fontSize:11,color:'#9CA3AF',marginBottom:2}}>Price</div>
                          <input type="number" style={{width:76,padding:'4px 8px',fontSize:12}} value={form.price} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{price:v});});}} />
                        </div>
                        <div style={{display:'flex',gap:5}}>
                          <button className="btn btn-primary btn-sm" onClick={function(){saveEdit(t.id);}}>Save</button>
                          <button className="btn btn-outline btn-sm" onClick={function(){setEditing(null);}}>✕</button>
                        </div>
                      </div>
                    ) : (
                      <button className="btn btn-outline btn-sm" onClick={function(){startEdit(t);}}>
                        {React.createElement(IconEdit,null)} Edit Price
                      </button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(function(){return localStorage.getItem('le_auth')==='1';});
  const [page, setPage] = useState('dashboard');
  const [bookings, setBookings] = useState(function(){return genBookings();});
  const [labs, setLabs] = useState(function(){return genLabs();});
  const [tests, setTests] = useState(function(){return genTests();});

  useEffect(function() {
    // Load real bookings from Supabase if available
    loadBookingsFromSupabase().then(function(data) {
      if (data && data.length > 0) setBookings(data);
    });
    // Also listen for localStorage changes (fallback)
    function handler(e) {
      if (e.key === 'le_bookings') {
        try { setBookings(JSON.parse(e.newValue || '[]')); } catch(ex) {}
      }
    }
    window.addEventListener('storage', handler);
    return function() { window.removeEventListener('storage', handler); };
  }, []);

  function login() { ['le_admin_auth','labease_admin_auth'].forEach(k=>localStorage.removeItem(k)); localStorage.setItem('le_auth','1'); setAuthed(true); }
  function logout() { localStorage.removeItem('le_auth'); setAuthed(false); }

  if (!authed) return React.createElement(Login, {onLogin:login});

  var pageTitles = {dashboard:'Dashboard',bookings:'Bookings',labs:'Labs',tests:'Tests & Pricing'};

  return (
    <div>
      <Sidebar page={page} setPage={setPage} onLogout={logout} />
      <div className="main">
        <div className="top-bar">
          <div style={{fontWeight:700,fontSize:15,color:'#0D1117'}}>{pageTitles[page]}</div>
          <div style={{fontSize:13,color:'#6B7280',display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'#1158A6',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:13}}>A</div>
            <span style={{fontWeight:500}}>Admin</span>
          </div>
        </div>
        {page==='dashboard' && <Dashboard bookings={bookings} />}
        {page==='bookings' && <Bookings bookings={bookings} setBookings={setBookings} />}
        {page==='labs' && <Labs labs={labs} setLabs={setLabs} />}
        {page==='tests' && <Tests tests={tests} setTests={setTests} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
</script>
</body>
</html>
