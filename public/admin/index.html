function previewSlots(timing) {
  if (!timing) return [];
  var cleaned = timing.replace(/[–—]/g, '-');
  var parts = cleaned.split(/\s+to\s+|-/i).map(function(s){return s.trim();}).filter(Boolean);
  if (parts.length < 2) return [];
  function extract(str) {
    var m = str.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)?/i);
    if (!m || !m[1]) return null;
    return { h: parseInt(m[1],10), min: parseInt(m[2]||'0',10), period: m[3]?m[3].toUpperCase():null };
  }
  function to24(h, period) { var hh=h; if(period==='PM'&&hh!==12) hh+=12; if(period==='AM'&&hh===12) hh=0; return hh; }
  var s=extract(parts[0]); var e=extract(parts[1]);
  if (!s||!e) return [];
  var sp=s.period, ep=e.period;
  if (!sp&&!ep){sp='AM';ep='PM';}
  else if (!sp&&ep){ var same=to24(s.h,ep)*60+s.min<to24(e.h,ep)*60+e.min; sp=same?ep:(ep==='AM'?'PM':'AM'); }
  else if (sp&&!ep){ep='PM';}
  var startMin=to24(s.h,sp)*60+s.min; var endMin=to24(e.h,ep)*60+e.min;
  if (endMin<=startMin) return [];
  var firstSlot=Math.ceil(startMin/60)*60; var slots=[];
  for (var m=firstSlot; m<endMin; m+=60) {
    var h24=Math.floor(m/60); var period=h24<12?'AM':'PM'; var h12=h24===0?12:h24>12?h24-12:h24;
    slots.push(h12+':00 '+period);
  }
  return slots;
}

async function loadBookingsFromSupabase() {
  if (!sb) return null;
  try {
    var res = await sb.from('bookings').select('*').order('created_at', {ascending: false});
    if (res.error) return null;
    return res.data.map(function(b) {
      var items = b.items || [];
      return {
        id: b.id,
        patient: b.patient_name,
        phone: b.patient_phone,
        test: items.length ? items.map(function(i){return i.name;}).join(', ') : '—',
        lab: b.lab_name || '—',
        date: b.slot_date || b.created_at.slice(0,10),
        mode: b.collection === 'home' ? 'Home' : 'Clinic',
        amount: b.total,
        status: b.status.charAt(0).toUpperCase() + b.status.slice(1),
        raw: b,
      };
    });
  } catch(e) { return null; }
}

async function updateBookingStatusInSupabase(id, status) {
  if (!sb) return false;
  try {
    var res = await sb.from('bookings').update({status: status.toLowerCase()}).eq('id', id);
    return !res.error;
  } catch(e) { return false; }
}

function genTests() {
  // Apply any saved price overrides from admin
  var overrides = {};
  try { overrides = JSON.parse(localStorage.getItem('le_price_overrides') || '{}'); } catch(e){}
  return ALL_LAB_TESTS.map(function(t) {
    var ov = overrides[t.id] || {};
    return Object.assign({}, t, {
      price: ov.price !== undefined ? ov.price : t.price,
      mrp:   ov.mrp   !== undefined ? ov.mrp   : t.mrp,
    });
  });
}

    });

function Labs(props) {
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [editTests, setEditTests] = useState([]);
  const [addingLab, setAddingLab] = useState(false);

  const [newLabTests, setNewLabTests] = useState([{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]);
  function startEdit(lab) {
    setEditing(lab.id);
    setForm({name:lab.name,city:lab.city||'',phone:lab.phone||'',rating:lab.rating||'4.5',address:lab.address||'',timing:lab.timing||'',sunday_timing:lab.sunday_timing||'',homeCollection:!!lab.homeCollection,nabl:!!lab.nabl,color:lab.color||'#1158A6',logoBase64:lab.logoBase64||''});
    var tests = Array.isArray(lab.tests) ? lab.tests.map(function(t){return {name:t.name,price:t.price,mrp:t.mrp,cat:t.cat||'General',time:t.time||'Same Day',subtitle:t.subtitle||''};}) : [];
    setEditTests(tests.length ? tests : [{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]);
  }
  function saveEdit(id) {
    var testsArr = editTests.filter(function(t){return t.name&&t.name.trim();}).map(function(t,i){return {id:'x'+id+'_'+i,name:t.name.trim(),price:parseFloat(t.price)||0,mrp:parseFloat(t.mrp)||parseFloat(t.price)||0,cat:t.cat||'General',time:t.time||'Same Day',subtitle:t.subtitle||''};});
    var next = props.labs.map(function(l){return l.id===id?Object.assign({},l,form,{rating:parseFloat(form.rating)||4.5,tests:testsArr.length?testsArr:l.tests}):l;});
    props.setLabs(next); localStorage.setItem('le_labs',JSON.stringify(next));
    // update extra_labs too
    var extras=[];try{extras=JSON.parse(localStorage.getItem('le_extra_labs')||'[]');}catch(e){}
    var updated=next.find(function(l){return l.id===id;});
    var knownIds=new Set([1,2,3,4,5,6]);
    if(!knownIds.has(id)&&updated){extras=extras.map(function(e){return e.id===id?updated:e;});localStorage.setItem('le_extra_labs',JSON.stringify(extras));}
    // lab name override for original labs
    var lnov={};try{lnov=JSON.parse(localStorage.getItem('le_lab_name_overrides')||'{}');}catch(e){}
    lnov[id]=form.name; localStorage.setItem('le_lab_name_overrides',JSON.stringify(lnov));
    // timing overrides — dedicated keys so main app reliably reads them
    var tov={};try{tov=JSON.parse(localStorage.getItem('le_timing_overrides')||'{}');}catch(e){}
    tov[id]=form.timing||''; localStorage.setItem('le_timing_overrides',JSON.stringify(tov));
    var stov={};try{stov=JSON.parse(localStorage.getItem('le_sunday_timing_overrides')||'{}');}catch(e){}
    stov[id]=form.sunday_timing||''; localStorage.setItem('le_sunday_timing_overrides',JSON.stringify(stov));
    setEditing(null);
  }
  function toggle(id) {
    var next = props.labs.map(function(l){return l.id===id?Object.assign({},l,{active:!l.active}):l;});
    props.setLabs(next);
    localStorage.setItem('le_labs', JSON.stringify(next));
    var toggled = next.find(function(l){return l.id===id;});
    if (toggled) {
      var labOv = {};
      try { labOv = JSON.parse(localStorage.getItem('le_lab_overrides')||'{}'); } catch(e){}
      labOv[id] = toggled.active;
      localStorage.setItem('le_lab_overrides', JSON.stringify(labOv));

  }
  function saveNewLab() {
    if (!newLab.name.trim()) return;
    var maxId = props.labs.reduce(function(m,l){return Math.max(m,l.id);},0);
    var labId = maxId+1;
    var testsArr = newLabTests.filter(function(t){return t.name.trim();}).map(function(t,i){return {id:'x'+labId+'_'+i,name:t.name.trim(),price:parseFloat(t.price)||199,mrp:parseFloat(t.mrp)||parseFloat(t.price)||199,cat:t.cat||'General',time:t.time||'Same Day',subtitle:t.subtitle||''};});
    if(testsArr.length===0) testsArr=[{id:'x'+labId+'_0',name:'Consultation',price:199,mrp:499,cat:'General',time:'Same Day'}];

    var next = props.labs.concat([lab]);
    props.setLabs(next);
    localStorage.setItem('le_labs', JSON.stringify(next));
    var extras = [];
    try { extras = JSON.parse(localStorage.getItem('le_extra_labs')||'[]'); } catch(e){}
    extras.push(lab);
    localStorage.setItem('le_extra_labs', JSON.stringify(extras));
    var tov2={};try{tov2=JSON.parse(localStorage.getItem('le_timing_overrides')||'{}');}catch(e){}
    tov2[labId]=lab.timing; localStorage.setItem('le_timing_overrides',JSON.stringify(tov2));

function Tests(props) {
  const [search, setSearch] = useState('');
  const [labFilter, setLabFilter] = useState('All');
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});

  var labNames = ['All','Apollo','SRL','Metropolis','Dr Lal','Thyrocare','Vijaya'];

  function startEdit(t) { setEditing(t.id); setForm({mrp:t.mrp, price:t.price, name:t.name}); }
  function saveEdit(id) {
    var newPrice = parseInt(form.price);
    var newMrp   = parseInt(form.mrp);
    var newName  = form.name;
    // Update local test list
    var next = props.tests.map(function(t){ return t.id===id ? Object.assign({},t,{price:newPrice,mrp:newMrp,name:newName}) : t; });
    props.setTests(next);
    // Write to le_price_overrides so main UI picks it up
    var ov = {};
    try { ov = JSON.parse(localStorage.getItem('le_price_overrides')||'{}'); } catch(e){}
    ov[id] = {price:newPrice, mrp:newMrp};
    localStorage.setItem('le_price_overrides', JSON.stringify(ov));
    // Sync price override to Supabase
    if (sb) { sb.from('price_overrides').upsert({test_id: id, price: newPrice}).then(function(){}); }
    // Write to le_test_name_overrides so main UI picks up name change
    var tnov = {};
    try { tnov = JSON.parse(localStorage.getItem('le_test_name_overrides')||'{}'); } catch(e){}
    tnov[id] = newName;
    localStorage.setItem('le_test_name_overrides', JSON.stringify(tnov));
    setEditing(null);
  }

  var filtered = props.tests.filter(function(t) {
    var mq = !search || t.name.toLowerCase().indexOf(search.toLowerCase())>-1 || t.cat.toLowerCase().indexOf(search.toLowerCase())>-1;
    var ml = labFilter==='All' || t.lab===labFilter;
    return mq && ml;
  });

  return (
    <div style={{padding:28}}>
      <div style={{fontSize:22,fontWeight:800,marginBottom:6,color:'#0D1117'}}>Tests & Pricing</div>
      <div style={{color:'#6B7280',fontSize:13,marginBottom:20}}>Edit prices per lab — changes reflect instantly in the main app</div>
      <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{position:'relative',width:280}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#9CA3AF'}}>{React.createElement(IconSearch,null)}</span>
          <input type="text" style={{width:'100%',paddingLeft:32}} placeholder="Search test or category…" value={search} onChange={function(e){setSearch(e.target.value);}} />
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {labNames.map(function(l) {
            return React.createElement('button', {
              key:l, className:'btn '+(labFilter===l?'btn-primary':'btn-outline')+' btn-sm',
              onClick:function(){setLabFilter(l);}
            }, l);
          })}
        </div>
      </div>
      <div style={{color:'#6B7280',fontSize:12,marginBottom:10}}>{filtered.length} entries</div>
      <div className="card" style={{overflow:'hidden'}}>
        <table>
          <thead>
            <tr><th>Test Name</th><th>Lab</th><th>Category</th><th>MRP</th><th>Offer Price</th><th>Discount</th><th>Action</th></tr>
          </thead>
          <tbody>
            {filtered.map(function(t) {
              var disc = Math.round((1 - t.price/t.mrp)*100);
              return (
                <tr key={t.id}>
                  <td style={{fontWeight:600,maxWidth:180}}>{t.name}</td>
                  <td>
                    <span style={{fontSize:12,background:'#EFF6FF',color:'#1158A6',padding:'3px 8px',borderRadius:6,fontWeight:600,whiteSpace:'nowrap'}}>{t.lab}</span>
                  </td>
                  <td><span style={{fontSize:12,background:'#F3F4F6',color:'#374151',padding:'3px 8px',borderRadius:6,fontWeight:600}}>{t.cat}</span></td>
                  <td style={{color:'#9CA3AF',textDecoration:'line-through'}}>{fmt(t.mrp)}</td>
                  <td style={{fontWeight:700,color:'#15803D'}}>{fmt(t.price)}</td>
                  <td><span style={{background:'#FFF7ED',color:'#C2410C',fontSize:12,fontWeight:700,padding:'3px 8px',borderRadius:6}}>{disc}% off</span></td>
                  <td>
                    {editing === t.id ? (
                      <div style={{display:'flex',gap:6,alignItems:'flex-end',flexWrap:'wrap'}}>
                        <div>
                          <div style={{fontSize:11,color:'#9CA3AF',marginBottom:2}}>Test Name</div>
                          <input type="text" style={{width:160,padding:'4px 8px',fontSize:12}} value={form.name} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{name:v});});}} />
                        </div>
                        <div>
                          <div style={{fontSize:11,color:'#9CA3AF',marginBottom:2}}>MRP</div>
                          <input type="number" style={{width:76,padding:'4px 8px',fontSize:12}} value={form.mrp} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{mrp:v});});}} />
                        </div>
                        <div>
                          <div style={{fontSize:11,color:'#9CA3AF',marginBottom:2}}>Price</div>
                          <input type="number" style={{width:76,padding:'4px 8px',fontSize:12}} value={form.price} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{price:v});});}} />
                        </div>
                        <div style={{display:'flex',gap:5}}>
                          <button className="btn btn-primary btn-sm" onClick={function(){saveEdit(t.id);}}>Save</button>
                          <button className="btn btn-outline btn-sm" onClick={function(){setEditing(null);}}>✕</button>
                        </div>
                      </div>
                    ) : (
                      <button className="btn btn-outline btn-sm" onClick={function(){startEdit(t);}}>
                        {React.createElement(IconEdit,null)} Edit Price
                      </button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function LogoEditor(props) {
  var logo=props.logo, onChangeLogo=props.onChangeLogo;
  var CSIZE=220;
  var sr=React.useState(null),rawSrc=sr[0],setRawSrc=sr[1];
  var sox=React.useState(0),offX=sox[0],setOffX=sox[1];
  var soy=React.useState(0),offY=soy[0],setOffY=soy[1];
  var sz=React.useState(1),zoom=sz[0],setZoom=sz[1];
  var sed=React.useState(false),editing=sed[0],setEditing=sed[1];
  // Use refs so event handlers always get latest values (no stale closure)
  var offXRef=React.useRef(0),offYRef=React.useRef(0),zoomRef=React.useRef(1);
  var dragRef=React.useRef(null),pinchDistRef=React.useRef(null);
  offXRef.current=offX; offYRef.current=offY; zoomRef.current=zoom;

  function clampZ(v){return Math.min(8,Math.max(0.05,v));}
  function onFileChange(ev){
    var file=ev.target.files[0]; if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e2){
      offXRef.current=0;offYRef.current=0;zoomRef.current=1;
      setOffX(0);setOffY(0);setZoom(1);
      setRawSrc(e2.target.result);setEditing(true);
    };
    reader.readAsDataURL(file);
  }
  function apply(){
    var canvas=document.createElement('canvas');
    canvas.width=CSIZE; canvas.height=CSIZE;
    var ctx=canvas.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,CSIZE,CSIZE);
    var ox=offXRef.current,oy=offYRef.current,z=zoomRef.current;
    var img=new Image();
    img.onload=function(){
      ctx.save();
      ctx.translate(CSIZE/2+ox,CSIZE/2+oy);
      ctx.scale(z,z);
      ctx.drawImage(img,-img.naturalWidth/2,-img.naturalHeight/2);
      ctx.restore();
      onChangeLogo(canvas.toDataURL('image/png'));
      setEditing(false); setRawSrc(null);
    };
    img.src=rawSrc;
  }
  // Mouse
  function onMD(ev){ev.preventDefault();dragRef.current={sx:ev.clientX,sy:ev.clientY,ox:offXRef.current,oy:offYRef.current};}
  function onMM(ev){
    if(!dragRef.current)return;
    var nx=dragRef.current.ox+ev.clientX-dragRef.current.sx;
    var ny=dragRef.current.oy+ev.clientY-dragRef.current.sy;
    offXRef.current=nx;offYRef.current=ny;setOffX(nx);setOffY(ny);
  }
  function onMU(){dragRef.current=null;}
  function onWheel(ev){
    ev.preventDefault();
    var nz=clampZ(zoomRef.current+(ev.deltaY>0?-0.08:0.08));
    zoomRef.current=nz;setZoom(nz);
  }
  // Touch — single finger drag + two finger pinch
  function getTouchDist(touches){
    var dx=touches[0].clientX-touches[1].clientX,dy=touches[0].clientY-touches[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }
  function onTD(ev){
    ev.preventDefault();
    if(ev.touches.length===1){
      var t=ev.touches[0];
      dragRef.current={sx:t.clientX,sy:t.clientY,ox:offXRef.current,oy:offYRef.current};
      pinchDistRef.current=null;
    } else if(ev.touches.length===2){
      dragRef.current=null;
      pinchDistRef.current=getTouchDist(ev.touches);
    }
  }
  function onTM(ev){
    ev.preventDefault();
    if(ev.touches.length===1&&dragRef.current){
      var t=ev.touches[0];
      var nx=dragRef.current.ox+t.clientX-dragRef.current.sx;
      var ny=dragRef.current.oy+t.clientY-dragRef.current.sy;
      offXRef.current=nx;offYRef.current=ny;setOffX(nx);setOffY(ny);
    } else if(ev.touches.length===2&&pinchDistRef.current){
      var dist=getTouchDist(ev.touches);
      var nz=clampZ(zoomRef.current*(dist/pinchDistRef.current));
      zoomRef.current=nz;setZoom(nz);
      pinchDistRef.current=dist;
    }
  }
  function onTE(){dragRef.current=null;pinchDistRef.current=null;}

  if(editing&&rawSrc){
    return (
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:600,color:'#6B7280',marginBottom:6}}>
          Logo Editor — 👆 drag · pinch to zoom · scroll wheel · ± buttons
        </div>
        <div style={{width:CSIZE,height:CSIZE,overflow:'hidden',borderRadius:12,border:'2px solid #1158A6',
          cursor:'grab',background:'#F0F4FF',position:'relative',userSelect:'none',touchAction:'none'}}
          onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}
          onTouchStart={onTD} onTouchMove={onTM} onTouchEnd={onTE}
          onWheel={onWheel}>
          <img src={rawSrc} style={{position:'absolute',left:'50%',top:'50%',
            transform:'translate(calc(-50% + '+offX+'px), calc(-50% + '+offY+'px)) scale('+zoom+')',
            transformOrigin:'center center',maxWidth:'none',pointerEvents:'none',userSelect:'none'}} draggable={false} />
          <div style={{position:'absolute',inset:0,border:'1px dashed rgba(17,88,166,.3)',borderRadius:10,pointerEvents:'none'}}/>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:10,marginBottom:10}}>
          <button onClick={function(){var nz=clampZ(zoomRef.current-0.1);zoomRef.current=nz;setZoom(nz);}}
            style={{width:32,height:32,border:'1px solid #E5E7EB',borderRadius:6,background:'#fff',fontSize:20,cursor:'pointer',fontWeight:700,padding:0,flexShrink:0}}>−</button>
          <input type="range" min="0.05" max="8" step="0.05" value={zoom}
            onChange={function(ev){var nz=parseFloat(ev.target.value);zoomRef.current=nz;setZoom(nz);}}
            style={{flex:1,accentColor:'#1158A6'}} />
          <button onClick={function(){var nz=clampZ(zoomRef.current+0.1);zoomRef.current=nz;setZoom(nz);}}
            style={{width:32,height:32,border:'1px solid #E5E7EB',borderRadius:6,background:'#fff',fontSize:20,cursor:'pointer',fontWeight:700,padding:0,flexShrink:0}}>+</button>
          <span style={{fontSize:12,color:'#6B7280',minWidth:44,textAlign:'right',fontWeight:600}}>{Math.round(zoom*100)}%</span>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-primary btn-sm" onClick={apply}>✓ Apply Logo</button>
          <button className="btn btn-outline btn-sm" onClick={function(){setEditing(false);setRawSrc(null);}}>Cancel</button>
        </div>
      </div>
    );
  }
  return (
    <div style={{marginBottom:14}}>
      <label style={{fontSize:11,fontWeight:600,color:'#6B7280',display:'block',marginBottom:6}}>Lab Logo</label>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        {logo
          ? <img src={logo} style={{width:52,height:52,borderRadius:10,objectFit:'contain',border:'1px solid #E5E7EB',background:'#F9FAFB',flexShrink:0}} />
          : <div style={{width:52,height:52,borderRadius:10,border:'2px dashed #D1D5DB',display:'flex',alignItems:'center',justifyContent:'center',color:'#9CA3AF',fontSize:22,flexShrink:0}}>🏥</div>
        }
        <label style={{cursor:'pointer'}}>
          <span style={{background:'#EFF6FF',color:'#1158A6',border:'1px solid #BFDBFE',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>{logo?'Change Logo':'+ Add Logo'}</span>
          <input type="file" accept="image/*" style={{display:'none'}} onChange={onFileChange} />
        </label>
        {logo && <button style={{background:'#FEE2E2',color:'#DC2626',border:'none',borderRadius:6,padding:'5px 10px',fontSize:12,fontWeight:600,cursor:'pointer'}} onClick={function(){onChangeLogo('');}}>Remove</button>}
      </div>
    </div>
  );
}

function LogoEditorInline(props) {
  var onDone=props.onDone, onCancel=props.onCancel;
  var CSIZE=240;
  var sr=useState(null),rawSrc=sr[0],setRawSrc=sr[1];
  // Use refs for position/zoom so event handlers always get latest values without stale closure
  var offXRef=useRef(0), offYRef=useRef(0), zoomRef=useRef(1);
  var sz=useState(1),zoom=sz[0],setZoom=sz[1];
  var sox=useState(0),offX=sox[0],setOffX=sox[1];
  var soy=useState(0),offY=soy[0],setOffY=soy[1];
  var dragRef=useRef(null);
  var pinchDistRef=useRef(null);

  // keep refs in sync with state
  offXRef.current=offX; offYRef.current=offY; zoomRef.current=zoom;

  function clampZ(v){return Math.min(8,Math.max(0.05,v));}

  function onFile(ev){
    var f=ev.target.files[0]; if(!f)return;
    var r=new FileReader();
    r.onload=function(e2){
      setRawSrc(e2.target.result);
      offXRef.current=0; offYRef.current=0; zoomRef.current=1;
      setOffX(0); setOffY(0); setZoom(1);
    };
    r.readAsDataURL(f);
  }

  function apply(){
    var canvas=document.createElement('canvas');
    canvas.width=CSIZE; canvas.height=CSIZE;
    var ctx=canvas.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,CSIZE,CSIZE);
    var img=new Image();
    // capture current values from refs (always fresh, no stale closure)
    var ox=offXRef.current, oy=offYRef.current, z=zoomRef.current;
    img.onload=function(){
      ctx.save();
      ctx.translate(CSIZE/2+ox, CSIZE/2+oy);
      ctx.scale(z,z);
      ctx.drawImage(img,-img.naturalWidth/2,-img.naturalHeight/2);
      ctx.restore();
      var b64=canvas.toDataURL('image/png');
      onDone(b64);
    };
    img.src=rawSrc;
  }

  // Mouse handlers
  function onMD(ev){
    ev.preventDefault();
    dragRef.current={sx:ev.clientX,sy:ev.clientY,ox:offXRef.current,oy:offYRef.current};
  }
  function onMM(ev){
    if(!dragRef.current)return;
    var nx=dragRef.current.ox+ev.clientX-dragRef.current.sx;
    var ny=dragRef.current.oy+ev.clientY-dragRef.current.sy;
    offXRef.current=nx; offYRef.current=ny;
    setOffX(nx); setOffY(ny);
  }
  function onMU(){dragRef.current=null;}

  // Touch handlers — single finger drag, two finger pinch-to-zoom
  function getTouchDist(touches){
    var dx=touches[0].clientX-touches[1].clientX;
    var dy=touches[0].clientY-touches[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }
  function onTD(ev){
    ev.preventDefault();
    if(ev.touches.length===1){
      var t=ev.touches[0];
      dragRef.current={sx:t.clientX,sy:t.clientY,ox:offXRef.current,oy:offYRef.current};
      pinchDistRef.current=null;
    } else if(ev.touches.length===2){
      dragRef.current=null;
      pinchDistRef.current=getTouchDist(ev.touches);
    }
  }
  function onTM(ev){
    ev.preventDefault();
    if(ev.touches.length===1 && dragRef.current){
      var t=ev.touches[0];
      var nx=dragRef.current.ox+t.clientX-dragRef.current.sx;
      var ny=dragRef.current.oy+t.clientY-dragRef.current.sy;
      offXRef.current=nx; offYRef.current=ny;
      setOffX(nx); setOffY(ny);
    } else if(ev.touches.length===2 && pinchDistRef.current){
      var dist=getTouchDist(ev.touches);
      var ratio=dist/pinchDistRef.current;
      var newZ=clampZ(zoomRef.current*ratio);
      zoomRef.current=newZ;
      setZoom(newZ);
      pinchDistRef.current=dist;
    }
  }
  function onTE(){dragRef.current=null; pinchDistRef.current=null;}

  // Wheel zoom on desktop
  function onWheel(ev){
    ev.preventDefault();
    var delta=ev.deltaY>0?-0.08:0.08;
    var newZ=clampZ(zoomRef.current+delta);
    zoomRef.current=newZ; setZoom(newZ);
  }

  return (
    <div style={{background:'#F9FAFB',borderRadius:14,padding:20,border:'1px solid #E5E7EB',marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:14,color:'#0D1117',marginBottom:14}}>Logo Editor</div>
      {!rawSrc ? (
        <div>
          <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer',marginBottom:12}}>
            <div style={{width:80,height:80,borderRadius:10,border:'2px dashed #BFDBFE',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,background:'#EFF6FF'}}>🖼</div>
            <div>
              <div style={{fontWeight:700,color:'#1158A6',fontSize:13,marginBottom:3}}>Tap to upload image</div>
              <div style={{fontSize:11,color:'#9CA3AF'}}>PNG, JPG, SVG — any size</div>
            </div>
            <input type="file" accept="image/*" style={{display:'none'}} onChange={onFile} />
          </label>
          <button className="btn btn-outline btn-sm" onClick={onCancel}>Cancel</button>
        </div>
      ) : (
        <div>
          <div style={{fontSize:11,color:'#6B7280',marginBottom:6,fontWeight:600}}>
            👆 Drag to move &nbsp;·&nbsp; Pinch or scroll to zoom &nbsp;·&nbsp; Use ± buttons too
          </div>
          <div
            style={{width:CSIZE,height:CSIZE,overflow:'hidden',borderRadius:12,border:'2px solid #1158A6',
              cursor:dragRef.current?'grabbing':'grab',background:'#F0F4FF',position:'relative',
              userSelect:'none',marginBottom:12,touchAction:'none'}}
            onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}
            onTouchStart={onTD} onTouchMove={onTM} onTouchEnd={onTE}
            onWheel={onWheel}>
            <img src={rawSrc}
              style={{position:'absolute',left:'50%',top:'50%',
                transform:'translate(calc(-50% + '+offX+'px), calc(-50% + '+offY+'px)) scale('+zoom+')',
                transformOrigin:'center center',maxWidth:'none',pointerEvents:'none',userSelect:'none'}}
              draggable={false} />
            {/* crosshair guide */}
            <div style={{position:'absolute',inset:0,pointerEvents:'none',border:'1px dashed rgba(17,88,166,.3)',borderRadius:10}} />
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
            <button onClick={function(){var nz=clampZ(zoomRef.current-0.1);zoomRef.current=nz;setZoom(nz);}}
              style={{width:32,height:32,border:'1px solid #E5E7EB',borderRadius:6,background:'#fff',fontSize:20,cursor:'pointer',fontWeight:700,lineHeight:'1',padding:0,flexShrink:0}}>−</button>
            <input type="range" min="0.05" max="8" step="0.05" value={zoom}
              onChange={function(ev){var nz=parseFloat(ev.target.value);zoomRef.current=nz;setZoom(nz);}}
              style={{flex:1,accentColor:'#1158A6'}} />
            <button onClick={function(){var nz=clampZ(zoomRef.current+0.1);zoomRef.current=nz;setZoom(nz);}}
              style={{width:32,height:32,border:'1px solid #E5E7EB',borderRadius:6,background:'#fff',fontSize:20,cursor:'pointer',fontWeight:700,lineHeight:'1',padding:0,flexShrink:0}}>+</button>
            <span style={{fontSize:12,color:'#6B7280',minWidth:44,textAlign:'right',fontWeight:600}}>{Math.round(zoom*100)}%</span>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-primary btn-sm" onClick={apply}>✓ Use This Logo</button>
            <button className="btn btn-outline btn-sm" onClick={function(){setRawSrc(null);offXRef.current=0;offYRef.current=0;zoomRef.current=1;setOffX(0);setOffY(0);setZoom(1);}}>Re-upload</button>
            <button className="btn btn-outline btn-sm" onClick={onCancel}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

  var sn=useState(''),newName=sn[0],setNewName=sn[1];
  var snl=useState(null),newLogo=snl[0],setNewLogo=snl[1];
  var sen=useState(''),editName=sen[0],setEditName=sen[1];
  var sel=useState(null),editLogo=sel[0],setEditLogo=sel[1];
  var sew=useState(false),editingLogoFor=sew[0],setEditingLogoFor=sew[1];
  var sawl=useState(null),addingLogoFor=sawl[0],setAddingLogoFor=sawl[1];
  var serr=useState(''),saveErr=serr[0],setSaveErr=serr[1];

    if(!newLogo){setSaveErr('Please upload a logo first.');return;}
    setSaveErr('');

    save(logos.concat([{id:id,name:name,src:'',b64:newLogo}]));

                    <button className="btn btn-sm" style={{background:'#FEF2F2',color:'#DC2626',border:'none',fontWeight:600}} onClick={function(){remove(l.id);}}>Remove</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {logos.length===0 && (
        <div style={{textAlign:'center',padding:48,color:'#9CA3AF',fontSize:14}}>No logos yet. Click "+ Add Logo" to add one.</div>
      )}
    </div>
  );
}

function Settings() {
  const [cur, setCur] = useState('');
  const [np, setNp] = useState('');
  const [cp, setCp] = useState('');
  const [msg, setMsg] = useState(null);
  function changePass(ev) {
    ev.preventDefault();
    var storedPass = localStorage.getItem('le_admin_pass') || 'labease2024';
    if(cur !== storedPass){setMsg({ok:false,text:'Current password is incorrect.'});return;}
    if(!np){setMsg({ok:false,text:'New password cannot be empty.'});return;}
    if(np !== cp){setMsg({ok:false,text:'New passwords do not match.'});return;}
    localStorage.setItem('le_admin_pass', np);
    setCur(''); setNp(''); setCp('');
    setMsg({ok:true,text:'Password updated successfully!'});
  }
  return (
    <div style={{padding:28}}>
      <div style={{fontSize:22,fontWeight:800,marginBottom:6,color:'#0D1117'}}>Settings</div>
      <div style={{fontSize:13.5,color:'#6B7280',marginBottom:24}}>Manage your admin account settings.</div>
      <div style={{maxWidth:480}}>
        <div className="card" style={{padding:28}}>
          <div style={{fontWeight:700,fontSize:16,color:'#0D1117',marginBottom:20}}>Change Password</div>
          <form onSubmit={changePass}>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:'#374151',display:'block',marginBottom:5}}>Current Password</label>
              <input type="password" style={{width:'100%'}} value={cur} onChange={function(ev){setCur(ev.target.value);}} placeholder="••••••••" />
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:'#374151',display:'block',marginBottom:5}}>New Password</label>
              <input type="password" style={{width:'100%'}} value={np} onChange={function(ev){setNp(ev.target.value);}} placeholder="••••••••" />
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:12,fontWeight:600,color:'#374151',display:'block',marginBottom:5}}>Confirm New Password</label>
              <input type="password" style={{width:'100%'}} value={cp} onChange={function(ev){setCp(ev.target.value);}} placeholder="••••••••" />
            </div>
            {msg && <div style={{background:msg.ok?'#F0FDF4':'#FEF2F2',color:msg.ok?'#15803D':'#DC2626',fontSize:12,padding:'8px 12px',borderRadius:8,marginBottom:14,fontWeight:500}}>{msg.text}</div>}
            <button type="submit" className="btn btn-primary">Update Password</button>
          </form>
        </div>
        <div className="card" style={{padding:28,marginTop:16}}>
          <div style={{fontWeight:700,fontSize:16,color:'#0D1117',marginBottom:8}}>Account Info</div>
          <div style={{fontSize:13.5,color:'#6B7280',lineHeight:1.6}}>
            <div><strong style={{color:'#374151'}}>Username: </strong>admin</div>
            <div><strong style={{color:'#374151'}}>Role: </strong>Administrator</div>
            <div><strong style={{color:'#374151'}}>Platform: </strong>LabEase Admin Panel</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(function(){return localStorage.getItem('le_auth')==='1';});
  const [page, setPage] = useState('dashboard');
  const [bookings, setBookings] = useState(function(){return genBookings();});
  const [labs, setLabs] = useState(function(){return genLabs();});
  const [tests, setTests] = useState(function(){return genTests();});

  useEffect(function() {
    // Load real bookings from Supabase if available
    loadBookingsFromSupabase().then(function(data) {
      if (data && data.length > 0) setBookings(data);
    });
    // Also listen for localStorage changes (fallback)
    function handler(e) {
      if (e.key === 'le_bookings') {
        try { setBookings(JSON.parse(e.newValue || '[]')); } catch(ex) {}
      }
    }
    window.addEventListener('storage', handler);
    return function() { window.removeEventListener('storage', handler); };
  }, []);

  function login() { ['le_admin_auth','labease_admin_auth'].forEach(k=>localStorage.removeItem(k)); localStorage.setItem('le_auth','1'); setAuthed(true); }
  function logout() { localStorage.removeItem('le_auth'); setAuthed(false); }

  if (!authed) return React.createElement(Login, {onLogin:login});

  var pageTitles = {dashboard:'Dashboard',bookings:'Bookings',labs:'Labs',tests:'Tests & Pricing',trusted:'Trusted Logos',settings:'Settings'};

  return (
    <div>
      <Sidebar page={page} setPage={setPage} onLogout={logout} />
      <div className="main">
        <div className="top-bar">
          <div style={{fontWeight:700,fontSize:15,color:'#0D1117'}}>{pageTitles[page]}</div>
          <div style={{fontSize:13,color:'#6B7280',display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'#1158A6',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:13}}>A</div>
            <span style={{fontWeight:500}}>Admin</span>
          </div>
        </div>
        {page==='dashboard' && <Dashboard bookings={bookings} />}
        {page==='bookings' && <Bookings bookings={bookings} setBookings={setBookings} />}
        {page==='labs' && <Labs labs={labs} setLabs={setLabs} />}
        {page==='tests' && <Tests tests={tests} setTests={setTests} />}
        {page==='trusted'  && <TrustedLogos />}
        {page==='settings' && <Settings />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
</script>
</body>
</html>
