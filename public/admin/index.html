<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LabEase Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: #F3F4F6; color: #111827; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
  input, select, button { font-family: inherit; }
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: #0D1117; display: flex; flex-direction: column; z-index: 100; }
  .main { margin-left: 240px; min-height: 100vh; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 8px; cursor: pointer; color: #9CA3AF; font-size: 14px; font-weight: 500; transition: all .15s; margin: 2px 8px; }
  .nav-item:hover { background: #161B22; color: #E5E7EB; }
  .nav-item.active { background: #1158A6; color: #fff; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 0 1px rgba(0,0,0,.05); }
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-blue { background: #EFF6FF; color: #1D4ED8; }
  .badge-yellow { background: #FFFBEB; color: #B45309; }
  .badge-green { background: #F0FDF4; color: #15803D; }
  .badge-red { background: #FEF2F2; color: #DC2626; }
  .badge-grey { background: #F3F4F6; color: #6B7280; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #F9FAFB; font-size: 12px; font-weight: 600; color: #6B7280; text-transform: uppercase; letter-spacing: .04em; padding: 12px 16px; text-align: left; }
  td { padding: 13px 16px; font-size: 13.5px; color: #374151; border-top: 1px solid #F3F4F6; }
  tr:hover td { background: #FAFAFA; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: #1158A6; color: #fff; }
  .btn-primary:hover { background: #0F4A8A; }
  .btn-outline { background: #fff; color: #374151; border: 1px solid #E5E7EB; }
  .btn-outline:hover { background: #F9FAFB; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  input[type=text], input[type=password], input[type=number], select { border: 1px solid #E5E7EB; border-radius: 8px; padding: 8px 12px; font-size: 13.5px; outline: none; transition: border .15s; background: #fff; color: #111827; }
  input[type=text]:focus, input[type=password]:focus, input[type=number]:focus, select:focus { border-color: #1158A6; box-shadow: 0 0 0 3px rgba(17,88,166,.1); }
  .progress-bar { height: 6px; border-radius: 3px; background: #E5E7EB; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .pill-btn { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid #E5E7EB; background: #fff; color: #6B7280; transition: all .15s; }
  .pill-btn.active { background: #1158A6; color: #fff; border-color: #1158A6; }
  .pill-btn:hover:not(.active) { background: #F3F4F6; }
  .lab-card { background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.07); padding: 20px; }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0D1117 0%, #161B22 100%); }
  .login-card { background: #fff; border-radius: 20px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .top-bar { background: #fff; border-bottom: 1px solid #F3F4F6; padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function IconDash() {
  return React.createElement('svg', {width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
    React.createElement('rect',{x:3,y:3,width:7,height:7}),
    React.createElement('rect',{x:14,y:3,width:7,height:7}),
    React.createElement('rect',{x:14,y:14,width:7,height:7}),
    React.createElement('rect',{x:3,y:14,width:7,height:7})
  );
}
function IconBook() {
  return React.createElement('svg', {width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
    React.createElement('path',{d:'M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z'}),
    React.createElement('path',{d:'M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z'})
  );
}
function IconLab() {
  return React.createElement('svg', {width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
    React.createElement('path',{d:'M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v11l-2 3h10l-2-3V3'})
  );
}
function IconTest() {
  return React.createElement('svg', {width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
    React.createElement('path',{d:'M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z'}),
    React.createElement('polyline',{points:'14 2 14 8 20 8'}),
    React.createElement('line',{x1:9,y1:13,x2:15,y2:13}),
    React.createElement('line',{x1:9,y1:17,x2:15,y2:17})
  );
}
function IconLogout() {
  return React.createElement('svg', {width:16,height:16,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
    React.createElement('path',{d:'M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4'}),
    React.createElement('polyline',{points:'16 17 21 12 16 7'}),
    React.createElement('line',{x1:21,y1:12,x2:9,y2:12})
  );
}
function IconSearch() {
  return React.createElement('svg', {width:15,height:15,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
    React.createElement('circle',{cx:11,cy:11,r:8}),
    React.createElement('line',{x1:21,y1:21,x2:'16.65',y2:'16.65'})
  );
}
function IconEdit() {
  return React.createElement('svg', {width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
    React.createElement('path',{d:'M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7'}),
    React.createElement('path',{d:'M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z'})
  );
}

const PATIENTS = ['Rahul Sharma','Priya Patel','Arun Kumar','Sneha Reddy','Vikram Singh','Divya Nair','Karthik Rao','Ananya Joshi','Mohammed Ali','Sunita Verma'];
const LAB_NAMES = ['Apollo Diagnostics','SRL Diagnostics','Metropolis Health','Dr Lal PathLabs','Thyrocare','Vijaya Diagnostics'];
const TEST_NAMES = ['CBC','Lipid Profile','Thyroid Profile','HbA1c','Vitamin D','LFT','KFT','Urine Routine','Full Body Checkup','Dengue NS1'];
const STATUSES = ['Confirmed','Sample Collected','Report Ready','Pending','Cancelled'];
const PHONES = ['9876543210','9123456780','9988776655','9012345678','9871234560','9654321098','9543210987','9432109876','9321098765','9210987654'];
const CITIES = ['Hyderabad','Bengaluru','Mumbai','Delhi','Chennai','Kolkata'];
const MODES = ['Home','Clinic'];

function genBookings() {
  const saved = localStorage.getItem('le_bookings');
  if (saved) return JSON.parse(saved);
  const prices = {'CBC':299,'Lipid Profile':599,'Thyroid Profile':799,'HbA1c':499,'Vitamin D':899,'LFT':799,'KFT':699,'Urine Routine':199,'Full Body Checkup':1999,'Dengue NS1':699};
  const data = [];
  for (let i = 0; i < 28; i++) {
    const t = TEST_NAMES[i % 10];
    const d = new Date(2024, 3 + Math.floor(i/5), (i % 27) + 1);
    data.push({
      id: 'LB' + (1000 + i),
      patient: PATIENTS[i % 10],
      phone: PHONES[i % 10],
      test: t,
      lab: LAB_NAMES[i % 6],
      date: d.toISOString().slice(0,10),
      mode: MODES[i % 2],
      amount: prices[t],
      status: STATUSES[i % 5],
    });
  }
  localStorage.setItem('le_bookings', JSON.stringify(data));
  return data;
}

function genLabs() {
  const saved = localStorage.getItem('le_labs');
  if (saved) return JSON.parse(saved);
  const ratings = [4.7, 4.5, 4.6, 4.8, 4.3, 4.6];
  const testCounts = [80, 65, 72, 90, 55, 68];
  const phones = ['040-23456789','080-34567890','022-45678901','011-56789012','044-67890123','040-78901234'];
  const data = LAB_NAMES.map(function(name, i) {
    return { id: i+1, name: name, city: CITIES[i], rating: ratings[i], tests: testCounts[i], phone: phones[i], active: i !== 4 };
  });
  localStorage.setItem('le_labs', JSON.stringify(data));
  return data;
}

function genTests() {
  const saved = localStorage.getItem('le_tests');
  if (saved) return JSON.parse(saved);
  const raw = [
    {name:'CBC',cat:'Haematology',mrp:499,price:299},
    {name:'Lipid Profile',cat:'Biochemistry',mrp:999,price:599},
    {name:'Thyroid Profile',cat:'Endocrinology',mrp:1299,price:799},
    {name:'HbA1c',cat:'Diabetes',mrp:799,price:499},
    {name:'Vitamin D',cat:'Nutritional',mrp:1499,price:899},
    {name:'LFT',cat:'Liver',mrp:1199,price:799},
    {name:'KFT',cat:'Kidney',mrp:1099,price:699},
    {name:'Urine Routine',cat:'Routine',mrp:399,price:199},
    {name:'Full Body Checkup',cat:'Preventive',mrp:3499,price:1999},
    {name:'Dengue NS1',cat:'Infectious',mrp:999,price:699},
  ];
  const data = raw.map(function(t, i) { return Object.assign({}, t, {id:i+1, labs:3+(i%4)}); });
  localStorage.setItem('le_tests', JSON.stringify(data));
  return data;
}

function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN'); }

function statusBadgeClass(s) {
  if (s === 'Confirmed') return 'badge badge-blue';
  if (s === 'Sample Collected') return 'badge badge-yellow';
  if (s === 'Report Ready') return 'badge badge-green';
  if (s === 'Cancelled') return 'badge badge-red';
  return 'badge badge-grey';
}

function Login(props) {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  function submit(e) {
    e.preventDefault();
    if (user.trim() === 'admin' && pass.trim() === 'labease2024') { props.onLogin(); }
    else setErr('Invalid credentials. Use admin / labease2024');
  }
  return (
    <div className="login-wrap">
      <div className="login-card">
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontFamily:'DM Serif Display',fontSize:34,color:'#0D1117',letterSpacing:'-0.5px'}}>LabEase</div>
          <div style={{color:'#6B7280',fontSize:13,marginTop:4,fontWeight:500}}>Admin Panel — Sign in to continue</div>
        </div>
        <form onSubmit={submit}>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:600,color:'#374151',display:'block',marginBottom:5}}>Username</label>
            <input type="text" style={{width:'100%'}} value={user} onChange={function(e){setUser(e.target.value);}} placeholder="admin" autoFocus />
          </div>
          <div style={{marginBottom:18}}>
            <label style={{fontSize:12,fontWeight:600,color:'#374151',display:'block',marginBottom:5}}>Password</label>
            <input type="password" style={{width:'100%'}} value={pass} onChange={function(e){setPass(e.target.value);}} placeholder="••••••••" />
          </div>
          {err && <div style={{background:'#FEF2F2',color:'#DC2626',fontSize:12,padding:'8px 12px',borderRadius:8,marginBottom:14,fontWeight:500}}>{err}</div>}
          <button type="submit" className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px'}}>Sign In</button>
          <div style={{textAlign:'center',marginTop:14,fontSize:12,color:'#9CA3AF'}}>Default: <strong>admin</strong> / <strong>labease2024</strong></div>
        </form>
      </div>
    </div>
  );
}

function Sidebar(props) {
  const items = [
    {key:'dashboard',label:'Dashboard',icon:React.createElement(IconDash,null)},
    {key:'bookings',label:'Bookings',icon:React.createElement(IconBook,null)},
    {key:'labs',label:'Labs',icon:React.createElement(IconLab,null)},
    {key:'tests',label:'Tests & Pricing',icon:React.createElement(IconTest,null)},
  ];
  return (
    <div className="sidebar">
      <div style={{padding:'24px 16px 12px'}}>
        <div style={{fontFamily:'DM Serif Display',fontSize:28,color:'#fff',letterSpacing:'-0.3px'}}>LabEase</div>
        <div style={{fontSize:11,color:'#6B7280',fontWeight:500,marginTop:2,letterSpacing:'0.06em',textTransform:'uppercase'}}>Admin Panel</div>
      </div>
      <div style={{height:1,background:'#161B22',margin:'8px 16px'}} />
      <nav style={{flex:1,padding:'8px 0'}}>
        {items.map(function(it) {
          return (
            <div key={it.key} className={'nav-item' + (props.page === it.key ? ' active' : '')} onClick={function(){props.setPage(it.key);}}>
              {it.icon}<span>{it.label}</span>
            </div>
          );
        })}
      </nav>
      <div style={{padding:'12px 8px 24px'}}>
        <div className="nav-item" onClick={props.onLogout} style={{color:'#EF4444'}}>
          {React.createElement(IconLogout,null)}<span>Logout</span>
        </div>
      </div>
    </div>
  );
}

function Dashboard(props) {
  const bookings = props.bookings;
  const total = bookings.length;
  const active = bookings.filter(function(b){return b.status==='Confirmed'||b.status==='Sample Collected';}).length;
  const revenue = bookings.filter(function(b){return b.status!=='Cancelled';}).reduce(function(s,b){return s+b.amount;},0);
  const statusCounts = {};
  STATUSES.forEach(function(s){statusCounts[s]=bookings.filter(function(b){return b.status===s;}).length;});
  const testCount = {};
  bookings.forEach(function(b){testCount[b.test]=(testCount[b.test]||0)+1;});
  const topTests = Object.entries(testCount).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  const maxT = topTests.length > 0 ? topTests[0][1] : 1;
  const recent = bookings.slice().sort(function(a,b){return b.id.localeCompare(a.id);}).slice(0,6);
  const statusColors = {'Confirmed':'#3B82F6','Sample Collected':'#F59E0B','Report Ready':'#10B981','Pending':'#9CA3AF','Cancelled':'#EF4444'};
  const stats = [
    {label:'Total Bookings',value:total,bg:'#EFF6FF',emoji:'📋'},
    {label:'Active Bookings',value:active,bg:'#F0FDF4',emoji:'✅'},
    {label:'Total Revenue',value:fmt(revenue),bg:'#FFF7ED',emoji:'💰'},
    {label:'Total Labs',value:LAB_NAMES.length,bg:'#FDF4FF',emoji:'🏥'},
  ];
  return (
    <div style={{padding:28}}>
      <div style={{fontSize:22,fontWeight:800,marginBottom:6,color:'#0D1117'}}>Dashboard</div>
      <div style={{fontSize:13.5,color:'#6B7280',marginBottom:24}}>Welcome back, Admin. Here's what's happening today.</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        {stats.map(function(s) {
          return (
            <div key={s.label} className="card" style={{padding:20}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontSize:12,color:'#6B7280',fontWeight:600,marginBottom:6}}>{s.label}</div>
                  <div style={{fontSize:26,fontWeight:800,color:'#0D1117'}}>{s.value}</div>
                </div>
                <div style={{width:44,height:44,borderRadius:12,background:s.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{s.emoji}</div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
        <div className="card" style={{padding:22}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:18,color:'#0D1117'}}>Booking Status Breakdown</div>
          {STATUSES.map(function(s) {
            return (
              <div key={s} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:500,marginBottom:5}}>
                  <span>{s}</span><span style={{color:'#6B7280'}}>{statusCounts[s]}</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:((statusCounts[s]/total)*100)+'%',background:statusColors[s]}} />
                </div>
              </div>
            );
          })}
        </div>
        <div className="card" style={{padding:22}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:18,color:'#0D1117'}}>Top 5 Booked Tests</div>
          {topTests.map(function(entry, i) {
            var name = entry[0]; var cnt = entry[1];
            return (
              <div key={name} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:500,marginBottom:5}}>
                  <span>{(i+1)+'. '+name}</span><span style={{color:'#6B7280'}}>{cnt} bookings</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:((cnt/maxT)*100)+'%',background:'#1158A6'}} />
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="card">
        <div style={{padding:'18px 20px 0',fontWeight:700,fontSize:15,color:'#0D1117'}}>Recent Bookings</div>
        <table>
          <thead>
            <tr><th>ID</th><th>Patient</th><th>Test</th><th>Lab</th><th>Date</th><th>Amount</th><th>Status</th></tr>
          </thead>
          <tbody>
            {recent.map(function(b) {
              return (
                <tr key={b.id}>
                  <td style={{fontWeight:600,color:'#1158A6'}}>{b.id}</td>
                  <td>{b.patient}</td>
                  <td>{b.test}</td>
                  <td>{b.lab}</td>
                  <td>{b.date}</td>
                  <td style={{fontWeight:600}}>{fmt(b.amount)}</td>
                  <td><span className={statusBadgeClass(b.status)}>{b.status}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Bookings(props) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('All');
  function updateStatus(id, status) {
    var next = props.bookings.map(function(b){return b.id===id?Object.assign({},b,{status:status}):b;});
    props.setBookings(next);
    localStorage.setItem('le_bookings', JSON.stringify(next));
  }
  var filtered = props.bookings.filter(function(b) {
    var q = search.toLowerCase();
    var matchQ = !q || b.patient.toLowerCase().indexOf(q)>-1 || b.id.toLowerCase().indexOf(q)>-1 || b.test.toLowerCase().indexOf(q)>-1;
    var matchF = filter==='All' || b.status===filter;
    return matchQ && matchF;
  });
  return (
    <div style={{padding:28}}>
      <div style={{fontSize:22,fontWeight:800,marginBottom:20,color:'#0D1117'}}>Bookings</div>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{position:'relative',flex:'1',minWidth:220}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#9CA3AF'}}>{React.createElement(IconSearch,null)}</span>
          <input type="text" style={{width:'100%',paddingLeft:32}} placeholder="Search by name, ID or test…" value={search} onChange={function(e){setSearch(e.target.value);}} />
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['All'].concat(STATUSES).map(function(s) {
            return <button key={s} className={'pill-btn'+(filter===s?' active':'')} onClick={function(){setFilter(s);}}>{s}</button>;
          })}
        </div>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table>
            <thead>
              <tr><th>ID</th><th>Patient</th><th>Phone</th><th>Test</th><th>Lab</th><th>Date</th><th>Mode</th><th>Amount</th><th>Status</th><th>Update Status</th></tr>
            </thead>
            <tbody>
              {filtered.length === 0 && (
                <tr><td colSpan={10} style={{textAlign:'center',color:'#9CA3AF',padding:32}}>No bookings found.</td></tr>
              )}
              {filtered.map(function(b) {
                return (
                  <tr key={b.id}>
                    <td style={{fontWeight:600,color:'#1158A6'}}>{b.id}</td>
                    <td style={{fontWeight:600}}>{b.patient}</td>
                    <td style={{color:'#6B7280'}}>{b.phone}</td>
                    <td>{b.test}</td>
                    <td>{b.lab}</td>
                    <td>{b.date}</td>
                    <td>
                      <span style={{fontSize:12,fontWeight:600,color:b.mode==='Home'?'#7E22CE':'#0369A1',background:b.mode==='Home'?'#FDF4FF':'#F0F9FF',padding:'3px 8px',borderRadius:6}}>{b.mode}</span>
                    </td>
                    <td style={{fontWeight:700}}>{fmt(b.amount)}</td>
                    <td><span className={statusBadgeClass(b.status)}>{b.status}</span></td>
                    <td>
                      <select value={b.status} onChange={function(e){updateStatus(b.id,e.target.value);}} style={{fontSize:12,padding:'5px 8px'}}>
                        {STATUSES.map(function(s){return <option key={s} value={s}>{s}</option>;})}
                      </select>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{padding:'12px 20px',fontSize:12,color:'#9CA3AF',borderTop:'1px solid #F3F4F6'}}>
          Showing {filtered.length} of {props.bookings.length} bookings
        </div>
      </div>
    </div>
  );
}

function Labs(props) {
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  function startEdit(lab) { setEditing(lab.id); setForm({name:lab.name,city:lab.city,phone:lab.phone,rating:lab.rating,tests:lab.tests}); }
  function saveEdit(id) {
    var next = props.labs.map(function(l){return l.id===id?Object.assign({},l,form,{rating:parseFloat(form.rating),tests:parseInt(form.tests)}):l;});
    props.setLabs(next); localStorage.setItem('le_labs',JSON.stringify(next)); setEditing(null);
  }
  function toggle(id) {
    var next = props.labs.map(function(l){return l.id===id?Object.assign({},l,{active:!l.active}):l;});
    props.setLabs(next); localStorage.setItem('le_labs',JSON.stringify(next));
  }
  var fields = [['name','Name'],['city','City'],['phone','Phone'],['rating','Rating'],['tests','Tests Count']];
  return (
    <div style={{padding:28}}>
      <div style={{fontSize:22,fontWeight:800,marginBottom:20,color:'#0D1117'}}>Labs</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:18}}>
        {props.labs.map(function(lab) {
          return (
            <div key={lab.id} className="lab-card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:15,color:'#0D1117',flex:1,paddingRight:8}}>{lab.name}</div>
                <span className={'badge '+(lab.active?'badge-green':'badge-red')} style={{flexShrink:0}}>{lab.active?'Active':'Inactive'}</span>
              </div>
              {editing === lab.id ? (
                <div>
                  {fields.map(function(pair) {
                    var k = pair[0]; var lbl = pair[1];
                    return (
                      <div key={k} style={{marginBottom:8}}>
                        <label style={{fontSize:11,fontWeight:600,color:'#6B7280',display:'block',marginBottom:3}}>{lbl}</label>
                        <input type="text" style={{width:'100%'}} value={form[k]} onChange={function(e){var val=e.target.value;setForm(function(f){var n=Object.assign({},f);n[k]=val;return n;});}} />
                      </div>
                    );
                  })}
                  <div style={{display:'flex',gap:8,marginTop:10}}>
                    <button className="btn btn-primary btn-sm" onClick={function(){saveEdit(lab.id);}}>Save</button>
                    <button className="btn btn-outline btn-sm" onClick={function(){setEditing(null);}}>Cancel</button>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{color:'#6B7280',fontSize:13,marginBottom:4}}>📍 {lab.city}</div>
                  <div style={{color:'#6B7280',fontSize:13,marginBottom:4}}>📞 {lab.phone}</div>
                  <div style={{display:'flex',gap:16,marginBottom:14,marginTop:10}}>
                    <div style={{fontSize:13}}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" strokeWidth="1" style={{verticalAlign:'middle'}}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                      {' '}<span style={{fontWeight:600}}>{lab.rating}</span> <span style={{color:'#9CA3AF'}}>rating</span>
                    </div>
                    <div style={{fontSize:13,color:'#6B7280'}}><strong style={{color:'#0D1117'}}>{lab.tests}</strong> tests</div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn btn-outline btn-sm" onClick={function(){startEdit(lab);}}>
                      {React.createElement(IconEdit,null)} Edit
                    </button>
                    <button className="btn btn-sm" onClick={function(){toggle(lab.id);}} style={{background:lab.active?'#FEF2F2':'#F0FDF4',color:lab.active?'#DC2626':'#15803D',border:'none',fontWeight:600}}>
                      {lab.active?'Deactivate':'Activate'}
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Tests(props) {
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  function startEdit(t) { setEditing(t.id); setForm({mrp:t.mrp,price:t.price}); }
  function saveEdit(id) {
    var next = props.tests.map(function(t){return t.id===id?Object.assign({},t,{mrp:parseInt(form.mrp),price:parseInt(form.price)}):t;});
    props.setTests(next); localStorage.setItem('le_tests',JSON.stringify(next)); setEditing(null);
  }
  var filtered = props.tests.filter(function(t) {
    return !search || t.name.toLowerCase().indexOf(search.toLowerCase())>-1 || t.cat.toLowerCase().indexOf(search.toLowerCase())>-1;
  });
  return (
    <div style={{padding:28}}>
      <div style={{fontSize:22,fontWeight:800,marginBottom:20,color:'#0D1117'}}>Tests & Pricing</div>
      <div style={{position:'relative',maxWidth:340,marginBottom:16}}>
        <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#9CA3AF'}}>{React.createElement(IconSearch,null)}</span>
        <input type="text" style={{width:'100%',paddingLeft:32}} placeholder="Search tests or category…" value={search} onChange={function(e){setSearch(e.target.value);}} />
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <table>
          <thead>
            <tr><th>Test Name</th><th>Category</th><th>MRP</th><th>Offer Price</th><th>Discount</th><th>Labs</th><th>Action</th></tr>
          </thead>
          <tbody>
            {filtered.map(function(t) {
              var disc = Math.round((1 - t.price/t.mrp)*100);
              return (
                <tr key={t.id}>
                  <td style={{fontWeight:600}}>{t.name}</td>
                  <td><span style={{fontSize:12,background:'#F3F4F6',color:'#374151',padding:'3px 8px',borderRadius:6,fontWeight:600}}>{t.cat}</span></td>
                  <td style={{color:'#9CA3AF',textDecoration:'line-through'}}>{fmt(t.mrp)}</td>
                  <td style={{fontWeight:700,color:'#15803D'}}>{fmt(t.price)}</td>
                  <td><span style={{background:'#FFF7ED',color:'#C2410C',fontSize:12,fontWeight:700,padding:'3px 8px',borderRadius:6}}>{disc}% off</span></td>
                  <td style={{color:'#6B7280'}}>{t.labs} labs</td>
                  <td>
                    {editing === t.id ? (
                      <div style={{display:'flex',gap:6,alignItems:'flex-end',flexWrap:'wrap'}}>
                        <div>
                          <div style={{fontSize:11,color:'#9CA3AF',marginBottom:2}}>MRP</div>
                          <input type="number" style={{width:80,padding:'4px 8px',fontSize:12}} value={form.mrp} onChange={function(e){var val=e.target.value;setForm(function(f){return Object.assign({},f,{mrp:val});});}} />
                        </div>
                        <div>
                          <div style={{fontSize:11,color:'#9CA3AF',marginBottom:2}}>Price</div>
                          <input type="number" style={{width:80,padding:'4px 8px',fontSize:12}} value={form.price} onChange={function(e){var val=e.target.value;setForm(function(f){return Object.assign({},f,{price:val});});}} />
                        </div>
                        <div style={{display:'flex',gap:5}}>
                          <button className="btn btn-primary btn-sm" onClick={function(){saveEdit(t.id);}}>Save</button>
                          <button className="btn btn-outline btn-sm" onClick={function(){setEditing(null);}}>✕</button>
                        </div>
                      </div>
                    ) : (
                      <button className="btn btn-outline btn-sm" onClick={function(){startEdit(t);}}>
                        {React.createElement(IconEdit,null)} Edit Price
                      </button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(function(){return localStorage.getItem('le_auth')==='1';});
  const [page, setPage] = useState('dashboard');
  const [bookings, setBookings] = useState(function(){return genBookings();});
  const [labs, setLabs] = useState(function(){return genLabs();});
  const [tests, setTests] = useState(function(){return genTests();});

  function login() { ['le_admin_auth','labease_admin_auth'].forEach(k=>localStorage.removeItem(k)); localStorage.setItem('le_auth','1'); setAuthed(true); }
  function logout() { localStorage.removeItem('le_auth'); setAuthed(false); }

  if (!authed) return React.createElement(Login, {onLogin:login});

  var pageTitles = {dashboard:'Dashboard',bookings:'Bookings',labs:'Labs',tests:'Tests & Pricing'};

  return (
    <div>
      <Sidebar page={page} setPage={setPage} onLogout={logout} />
      <div className="main">
        <div className="top-bar">
          <div style={{fontWeight:700,fontSize:15,color:'#0D1117'}}>{pageTitles[page]}</div>
          <div style={{fontSize:13,color:'#6B7280',display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'#1158A6',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:13}}>A</div>
            <span style={{fontWeight:500}}>Admin</span>
          </div>
        </div>
        {page==='dashboard' && <Dashboard bookings={bookings} />}
        {page==='bookings' && <Bookings bookings={bookings} setBookings={setBookings} />}
        {page==='labs' && <Labs labs={labs} setLabs={setLabs} />}
        {page==='tests' && <Tests tests={tests} setTests={setTests} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
</script>
</body>
</html>
