<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LabEase</title>
  <script>
    // GitHub Pages SPA routing trick
    // Redirect /labease/some-path → /labease/?p=/some-path
    // App.jsx reads ?p= on load and navigates to the right page
    var base = '/labease';
    var path = window.location.pathname.replace(base, '') || '/';
    if (path !== '/') {
      window.location.replace(
        base + '/?p=' + encodeURIComponent(path) +
        (window.location.search ? '&' + window.location.search.slice(1) : '') +
        window.location.hash
      );
    } else {
      window.location.replace(base + '/');
    }
  </script>
</head>
<body></body>
</html>
