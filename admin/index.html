function downloadCSV(rows) {
  var headers = ['Booking ID','Patient','Phone','Email','Test','Lab','Date','Mode','Amount','Status','Address','Notes'];
  var lines = [headers.join(',')].concat(rows.map(function(b){
    return [b.id,b.patient,b.phone,b.email||'',b.test,b.lab,b.date,b.mode,b.amount,b.status,b.address||'',b.notes||''].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');
  }));
  var blob = new Blob([lines.join('\n')],{type:'text/csv'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='LabEase_Bookings_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

    var storedPass=localStorage.getItem('le_admin_pass')||'labease2024';

    if(!np){setMsg({ok:false,text:'New password cannot be empty.'});return;}
    if(np!==cp){setMsg({ok:false,text:'New passwords do not match.'});return;}
    localStorage.setItem('le_admin_pass',np);
    setCur('');setNp('');setCp('');
    setMsg({ok:true,text:'Password updated successfully!'});
  }
  return e('div',{className:'page-pad',style:{padding:28}},
    e('div',{style:{fontSize:22,fontWeight:800,marginBottom:6,color:'#0D1117'}},'Settings'),
    e('div',{style:{fontSize:13.5,color:'#6B7280',marginBottom:24}},'Manage your admin account settings.'),
    e('div',{style:{maxWidth:480}},
      e('div',{className:'card',style:{padding:28}},
        e('div',{style:{fontWeight:700,fontSize:16,color:'#0D1117',marginBottom:20}},'Change Password'),
        e('form',{onSubmit:changePass},
          e('div',{style:{marginBottom:14}},
            e('label',{style:{fontSize:12,fontWeight:600,color:'#374151',display:'block',marginBottom:5}},'Current Password'),
            e('input',{type:'password',style:{width:'100%'},value:cur,onChange:function(ev){setCur(ev.target.value);},placeholder:'••••••••'})
          ),
          e('div',{style:{marginBottom:14}},
            e('label',{style:{fontSize:12,fontWeight:600,color:'#374151',display:'block',marginBottom:5}},'New Password'),
            e('input',{type:'password',style:{width:'100%'},value:np,onChange:function(ev){setNp(ev.target.value);},placeholder:'••••••••'})
          ),
          e('div',{style:{marginBottom:18}},
            e('label',{style:{fontSize:12,fontWeight:600,color:'#374151',display:'block',marginBottom:5}},'Confirm New Password'),
            e('input',{type:'password',style:{width:'100%'},value:cp,onChange:function(ev){setCp(ev.target.value);},placeholder:'••••••••'})
          ),
          msg?e('div',{style:{background:msg.ok?'#F0FDF4':'#FEF2F2',color:msg.ok?'#15803D':'#DC2626',fontSize:12,padding:'8px 12px',borderRadius:8,marginBottom:14,fontWeight:500}},msg.text):null,
          e('button',{type:'submit',className:'btn btn-primary'},'Update Password')
        )
      ),
      e('div',{className:'card',style:{padding:28,marginTop:16}},
        e('div',{style:{fontWeight:700,fontSize:16,color:'#0D1117',marginBottom:8}},'Account Info'),
        e('div',{style:{fontSize:13.5,color:'#6B7280',lineHeight:1.6}},
          e('div',null,e('strong',{style:{color:'#374151'}},'Username: '),'admin'),
          e('div',null,e('strong',{style:{color:'#374151'}},'Role: '),'Administrator'),
          e('div',null,e('strong',{style:{color:'#374151'}},'Platform: '),'LabEase Admin Panel')
        )
      )
    )
  );
}

function App() {
  var s1=useState(function(){return localStorage.getItem('le_auth')==='1';}),authed=s1[0],setAuthed=s1[1];
  var s2=useState('dashboard'),page=s2[0],setPage=s2[1];
  var s3=useState(function(){return genBookings();}),bookings=s3[0],setBookings=s3[1];
  var s4=useState(function(){return genLabs();}),labs=s4[0],setLabs=s4[1];
  var s5=useState(function(){return genTests();}),tests=s5[0],setTests=s5[1];
  var s6=useState(false),sideOpen=s6[0],setSideOpen=s6[1];
  useEffect(function(){
    function handler(ev){if(ev.key==='le_bookings'){try{setBookings(JSON.parse(ev.newValue||'[]'));}catch(ex){}}}
    window.addEventListener('storage',handler);
    return function(){window.removeEventListener('storage',handler);};
  },[]);
  function login(){localStorage.setItem('le_auth','1');setAuthed(true);}
  function logout(){localStorage.removeItem('le_auth');setAuthed(false);}
  if(!authed)return e(Login,{onLogin:login});
  var pageTitles={dashboard:'Dashboard',bookings:'Bookings',labs:'Labs',tests:'Tests & Pricing',settings:'Settings'};
  return e('div',null,
    sideOpen?e('div',{className:'sidebar-overlay',onClick:function(){setSideOpen(false);}}):null,
    e(Sidebar,{page:page,setPage:setPage,onLogout:logout,open:sideOpen,onClose:function(){setSideOpen(false);}}),
    e('div',{className:'main'},
      e('div',{className:'top-bar'},
        e('div',{style:{display:'flex',alignItems:'center',gap:10}},
          e('button',{className:'ham-btn',onClick:function(){setSideOpen(true);},style:{display:'flex',flexDirection:'column',gap:4.5,padding:'6px'}},
            e('span',{style:{display:'block',width:20,height:2.5,background:'#374151',borderRadius:2}}),
            e('span',{style:{display:'block',width:20,height:2.5,background:'#374151',borderRadius:2}}),
            e('span',{style:{display:'block',width:20,height:2.5,background:'#374151',borderRadius:2}})
          ),
          e('div',{style:{fontWeight:700,fontSize:15,color:'#0D1117'}},pageTitles[page])
        ),
        e('div',{style:{fontSize:13,color:'#6B7280',display:'flex',alignItems:'center',gap:8}},
          e('div',{style:{width:32,height:32,borderRadius:'50%',background:'#1158A6',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:13}},'A'),
          e('span',{className:'hide-mobile',style:{fontWeight:500}},'Admin')
        )
      ),
      page==='dashboard'?e(Dashboard,{bookings:bookings,labs:labs}):null,
      page==='bookings'?e(Bookings,{bookings:bookings,setBookings:setBookings}):null,
      page==='labs'?e(Labs,{labs:labs,setLabs:setLabs}):null,
      page==='tests'?e(Tests,{tests:tests,setTests:setTests}):null,
      page==='settings'?e(Settings,null):null
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
})();
</script>
</body>
</html>
