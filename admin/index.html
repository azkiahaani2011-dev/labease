<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LabEase Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Manrope',sans-serif;background:#F3F4F6;color:#111827;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px;}
input,select,button{font-family:inherit;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#0D1117;display:flex;flex-direction:column;z-index:100;}
.main{margin-left:240px;min-height:100vh;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;cursor:pointer;color:#9CA3AF;font-size:14px;font-weight:500;transition:all .15s;margin:2px 8px;}
.nav-item:hover{background:#161B22;color:#E5E7EB;}
.nav-item.active{background:#1158A6;color:#fff;}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07),0 0 1px rgba(0,0,0,.05);}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-blue{background:#EFF6FF;color:#1D4ED8;}.badge-yellow{background:#FFFBEB;color:#B45309;}
.badge-green{background:#F0FDF4;color:#15803D;}.badge-red{background:#FEF2F2;color:#DC2626;}
.badge-grey{background:#F3F4F6;color:#6B7280;}
table{width:100%;border-collapse:collapse;}
th{background:#F9FAFB;font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.04em;padding:12px 16px;text-align:left;}
td{padding:13px 16px;font-size:13.5px;color:#374151;border-top:1px solid #F3F4F6;}
tr:hover td{background:#FAFAFA;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:#1158A6;color:#fff;}.btn-primary:hover{background:#0F4A8A;}
.btn-outline{background:#fff;color:#374151;border:1px solid #E5E7EB;}.btn-outline:hover{background:#F9FAFB;}
.btn-sm{padding:5px 11px;font-size:12px;}
input[type=text],input[type=password],input[type=number],select{border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:13.5px;outline:none;transition:border .15s;background:#fff;color:#111827;}
input[type=text]:focus,input[type=password]:focus,input[type=number]:focus,select:focus{border-color:#1158A6;box-shadow:0 0 0 3px rgba(17,88,166,.1);}
.progress-bar{height:6px;border-radius:3px;background:#E5E7EB;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .4s;}
.pill-btn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #E5E7EB;background:#fff;color:#6B7280;transition:all .15s;}
.pill-btn.active{background:#1158A6;color:#fff;border-color:#1158A6;}
.pill-btn:hover:not(.active){background:#F3F4F6;}
.lab-card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:20px;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0D1117 0%,#161B22 100%);}
.login-card{background:#fff;border-radius:20px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.top-bar{background:#fff;border-bottom:1px solid #F3F4F6;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;}
#root{min-height:100vh;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Tiny reactive framework ──────────────────────────────────────────────────
let _renderFn = null;
function setRender(fn){ _renderFn = fn; }
function rerender(){ if(_renderFn) _renderFn(); }

// ── State ────────────────────────────────────────────────────────────────────
const state = {
  authed: localStorage.getItem('le_auth') === '1',
  page: 'dashboard',
  bookings: loadBookings(),
  labs: loadLabs(),
  statusFilter: 'All',
  search: '',
  labFilter: 'All',
  testSearch: '',
  testLabFilter: 'All',
  editingBookingId: null,
};

function loadBookings(){
  try{
    const s = localStorage.getItem('le_bookings');
    if(s){
      const data = JSON.parse(s);
      // Remove old auto-generated demo entries (IDs LB1000–LB1027)
      return data.filter(b => !/^LB10[012]\d$/.test(b.id));
    }
  }catch(e){}
  return [];
}
function saveBookings(){ localStorage.setItem('le_bookings', JSON.stringify(state.bookings)); }

function loadLabs(){
  try{
    const s = localStorage.getItem('le_labs');
    if(s) return JSON.parse(s);
  }catch(e){}
  const LAB_NAMES = ['Apollo Diagnostics','SRL Diagnostics','Metropolis Health','Dr Lal PathLabs','Thyrocare','Vijaya Diagnostics'];
  const CITIES = ['Hyderabad','Bengaluru','Mumbai','Delhi','Chennai','Kolkata'];
  const phones = ['040-23456789','080-34567890','022-45678901','011-56789012','044-67890123','040-78901234'];
  const ratings = [4.7,4.5,4.6,4.8,4.3,4.6];
  const testCounts = [80,65,72,90,55,68];
  const data = LAB_NAMES.map((name,i)=>({id:i+1,name,city:CITIES[i],rating:ratings[i],tests:testCounts[i],phone:phones[i],active:i!==4}));
  localStorage.setItem('le_labs', JSON.stringify(data));
  return data;
}
function saveLabs(){ localStorage.setItem('le_labs', JSON.stringify(state.labs)); }

const STATUSES = ['Confirmed','Sample Collected','Report Ready','Pending','Cancelled'];
const LAB_NAMES = ['Apollo Diagnostics','SRL Diagnostics','Metropolis Health','Dr Lal PathLabs','Thyrocare','Vijaya Diagnostics'];

function fmt(n){ return '₹' + Number(n).toLocaleString('en-IN'); }
function statusBadge(s){
  const cls = s==='Confirmed'?'badge-blue':s==='Sample Collected'?'badge-yellow':s==='Report Ready'?'badge-green':s==='Cancelled'?'badge-red':'badge-grey';
  return `<span class="badge ${cls}">${s}</span>`;
}

// ── SVG Icons ────────────────────────────────────────────────────────────────
const ICO = {
  dash: `<svg width=18 height=18 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
  book: `<svg width=18 height=18 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
  lab: `<svg width=18 height=18 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v11l-2 3h10l-2-3V3"/></svg>`,
  logout: `<svg width=16 height=16 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
  search: `<svg width=15 height=15 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  edit: `<svg width=14 height=14 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  dl: `<svg width=15 height=15 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  star: `<svg width=13 height=13 viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
};

// ── Render helpers ───────────────────────────────────────────────────────────
function sidebar(){
  const items = [
    {key:'dashboard',label:'Dashboard',ico:ICO.dash},
    {key:'bookings',label:'Bookings',ico:ICO.book},
    {key:'labs',label:'Labs',ico:ICO.lab},
  ];
  return `<div class="sidebar">
    <div style="padding:24px 16px 12px">
      <div style="font-family:'DM Serif Display';font-size:28px;color:#fff;letter-spacing:-0.3px">LabEase</div>
      <div style="font-size:11px;color:#6B7280;font-weight:500;margin-top:2px;letter-spacing:.06em;text-transform:uppercase">Admin Panel</div>
    </div>
    <div style="height:1px;background:#161B22;margin:8px 16px"></div>
    <nav style="flex:1;padding:8px 0">
      ${items.map(it=>`<div class="nav-item${state.page===it.key?' active':''}" onclick="go('${it.key}')">${it.ico}<span>${it.label}</span></div>`).join('')}
    </nav>
    <div style="padding:12px 8px 24px">
      <div class="nav-item" onclick="doLogout()" style="color:#EF4444">${ICO.logout}<span>Logout</span></div>
    </div>
  </div>`;
}

function topbar(){
  const titles = {dashboard:'Dashboard',bookings:'Bookings',labs:'Labs'};
  return `<div class="top-bar">
    <div style="font-weight:700;font-size:15px;color:#0D1117">${titles[state.page]||''}</div>
    <div style="font-size:13px;color:#6B7280;display:flex;align-items:center;gap:8px">
      <div style="width:32px;height:32px;border-radius:50%;background:#1158A6;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px">A</div>
      <span style="font-weight:500">Admin</span>
    </div>
  </div>`;
}

function pageLogin(){
  return `<div class="login-wrap">
    <div class="login-card">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-family:'DM Serif Display';font-size:34px;color:#0D1117;letter-spacing:-0.5px">LabEase</div>
        <div style="color:#6B7280;font-size:13px;margin-top:4px;font-weight:500">Admin Panel — Sign in to continue</div>
      </div>
      <form onsubmit="doLogin(event)">
        <div style="margin-bottom:14px">
          <label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px">Username</label>
          <input type="text" id="u" style="width:100%" placeholder="admin" autocomplete="username" />
        </div>
        <div style="margin-bottom:18px">
          <label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px">Password</label>
          <input type="password" id="p" style="width:100%" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div id="lerr" style="display:none;background:#FEF2F2;color:#DC2626;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:14px;font-weight:500"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px">Sign In</button>
        <div style="text-align:center;margin-top:14px;font-size:12px;color:#9CA3AF">Default: <strong>admin</strong> / <strong>labease2024</strong></div>
      </form>
    </div>
  </div>`;
}

function pageDashboard(){
  const bk = state.bookings;
  const total = bk.length;
  const active = bk.filter(b=>b.status==='Confirmed'||b.status==='Sample Collected').length;
  const revenue = bk.filter(b=>b.status!=='Cancelled').reduce((s,b)=>s+(b.amount||0),0);
  const sc = {}; STATUSES.forEach(s=>{ sc[s]=bk.filter(b=>b.status===s).length; });
  const tc = {}; bk.forEach(b=>{ tc[b.test]=(tc[b.test]||0)+1; });
  const topTests = Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxT = topTests.length>0?topTests[0][1]:1;
  const recent = bk.slice().sort((a,b)=>(b.id||'').localeCompare(a.id||'')).slice(0,8);
  const scol = {'Confirmed':'#3B82F6','Sample Collected':'#F59E0B','Report Ready':'#10B981','Pending':'#9CA3AF','Cancelled':'#EF4444'};
  const stats = [
    {label:'Total Bookings',value:total,bg:'#EFF6FF',emoji:'📋'},
    {label:'Active Bookings',value:active,bg:'#F0FDF4',emoji:'✅'},
    {label:'Total Revenue',value:fmt(revenue),bg:'#FFF7ED',emoji:'💰'},
    {label:'Total Labs',value:LAB_NAMES.length,bg:'#FDF4FF',emoji:'🏥'},
  ];
  return `<div style="padding:28px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div style="font-size:22px;font-weight:800;color:#0D1117">Dashboard</div>
      <button class="btn btn-outline btn-sm" onclick="refreshBookings()" style="font-size:12px">↻ Refresh</button>
    </div>
    <div style="font-size:13.5px;color:#6B7280;margin-bottom:24px">Welcome back, Admin. Here's what's happening today.</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
      ${stats.map(s=>`<div class="card" style="padding:20px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:12px;color:#6B7280;font-weight:600;margin-bottom:6px">${s.label}</div>
            <div style="font-size:26px;font-weight:800;color:#0D1117">${s.value}</div>
          </div>
          <div style="width:44px;height:44px;border-radius:12px;background:${s.bg};display:flex;align-items:center;justify-content:center;font-size:20px">${s.emoji}</div>
        </div>
      </div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
      <div class="card" style="padding:22px">
        <div style="font-weight:700;font-size:15px;margin-bottom:18px;color:#0D1117">Booking Status Breakdown</div>
        ${total===0?`<div style="color:#9CA3AF;font-size:13px;padding:8px 0">No bookings yet.</div>`
          :STATUSES.map(s=>`<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:500;margin-bottom:5px">
            <span>${s}</span><span style="color:#6B7280">${sc[s]||0}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${total?((sc[s]||0)/total*100):0}%;background:${scol[s]}"></div></div>
        </div>`).join('')}
      </div>
      <div class="card" style="padding:22px">
        <div style="font-weight:700;font-size:15px;margin-bottom:18px;color:#0D1117">Top 5 Booked Tests</div>
        ${topTests.length===0?`<div style="color:#9CA3AF;font-size:13px;padding:8px 0">No data yet.</div>`
          :topTests.map(([name,cnt],i)=>`<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:500;margin-bottom:5px">
            <span>${i+1}. ${name}</span><span style="color:#6B7280">${cnt} bookings</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${(cnt/maxT*100).toFixed(1)}%;background:#1158A6"></div></div>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div style="padding:18px 20px 0;font-weight:700;font-size:15px;color:#0D1117">Recent Bookings</div>
      ${recent.length===0
        ?`<div style="padding:40px;text-align:center;color:#9CA3AF;font-size:13.5px">No bookings yet. Bookings from patients will appear here automatically.</div>`
        :`<table>
          <thead><tr><th>ID</th><th>Patient</th><th>Test</th><th>Lab</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody>${recent.map(b=>`<tr>
            <td style="font-weight:600;color:#1158A6">${b.id||'—'}</td>
            <td>${b.patient||'—'}</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.test||'—'}</td>
            <td>${b.lab||'—'}</td><td>${b.date||'—'}</td>
            <td style="font-weight:600">${fmt(b.amount||0)}</td>
            <td>${statusBadge(b.status||'Pending')}</td>
          </tr>`).join('')}</tbody>
        </table>`}
    </div>
  </div>`;
}

function pageBookings(){
  const q = (state.search||'').toLowerCase();
  const f = state.statusFilter||'All';
  const filtered = state.bookings.filter(b=>{
    const mq = !q || (b.patient||'').toLowerCase().includes(q) || (b.id||'').toLowerCase().includes(q) || (b.test||'').toLowerCase().includes(q);
    const mf = f==='All' || b.status===f;
    return mq && mf;
  }).sort((a,b)=>(b.id||'').localeCompare(a.id||''));

  return `<div style="padding:28px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="font-size:22px;font-weight:800;color:#0D1117">Bookings</div>
      <button class="btn btn-outline" onclick="dlBookings()" style="display:inline-flex;align-items:center;gap:6px">${ICO.dl} Download CSV</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <div style="position:relative;flex:1;min-width:220px">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9CA3AF;pointer-events:none">${ICO.search}</span>
        <input type="text" id="bsearch" style="width:100%;padding-left:32px" placeholder="Search by name, ID or test…"
          value="${(state.search||'').replace(/"/g,'&quot;')}" oninput="setSearch(this.value)" />
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${['All',...STATUSES].map(s=>`<button class="pill-btn${f===s?' active':''}" onclick="setStatusFilter('${s}')">${s}</button>`).join('')}
      </div>
    </div>
    <div class="card" style="overflow:hidden">
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>ID</th><th>Patient</th><th>Phone</th><th>Test</th><th>Lab</th><th>Date</th><th>Mode</th><th>Amount</th><th>Status</th><th>Update</th></tr></thead>
          <tbody>
            ${filtered.length===0?`<tr><td colspan="10" style="text-align:center;color:#9CA3AF;padding:32px">No bookings found.</td></tr>`
              :filtered.map(b=>`<tr>
              <td style="font-weight:600;color:#1158A6">${b.id||'—'}</td>
              <td style="font-weight:600">${b.patient||'—'}</td>
              <td style="color:#6B7280">${b.phone||'—'}</td>
              <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.test||'—'}</td>
              <td>${b.lab||'—'}</td><td>${b.date||'—'}</td>
              <td><span style="font-size:12px;font-weight:600;color:${b.mode==='Home'?'#7E22CE':'#0369A1'};background:${b.mode==='Home'?'#FDF4FF':'#F0F9FF'};padding:3px 8px;border-radius:6px">${b.mode||'—'}</span></td>
              <td style="font-weight:700">${fmt(b.amount||0)}</td>
              <td>${statusBadge(b.status||'Pending')}</td>
              <td><select onchange="updateStatus('${b.id}',this.value)" style="font-size:12px;padding:5px 8px">
                ${STATUSES.map(s=>`<option value="${s}"${b.status===s?' selected':''}>${s}</option>`).join('')}
              </select></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="padding:12px 20px;font-size:12px;color:#9CA3AF;border-top:1px solid #F3F4F6">
        Showing ${filtered.length} of ${state.bookings.length} bookings
      </div>
    </div>
  </div>`;
}

function pageLabs(){
  return `<div style="padding:28px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="font-size:22px;font-weight:800;color:#0D1117">Labs</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">
      ${state.labs.map(lab=>`<div class="lab-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div style="font-weight:700;font-size:15px;color:#0D1117;flex:1;padding-right:8px">${lab.name}</div>
          <span class="badge ${lab.active?'badge-green':'badge-red'}" style="flex-shrink:0">${lab.active?'Active':'Inactive'}</span>
        </div>
        <div style="color:#6B7280;font-size:13px;margin-bottom:4px">📍 ${lab.city||'—'}</div>
        <div style="color:#6B7280;font-size:13px;margin-bottom:12px">📞 ${lab.phone||'—'}</div>
        <div style="display:flex;gap:16px;margin-bottom:14px">
          <div style="font-size:13px">${ICO.star} <span style="font-weight:600">${lab.rating||'—'}</span> <span style="color:#9CA3AF">rating</span></div>
          <div style="font-size:13px;color:#6B7280"><strong style="color:#0D1117">${Array.isArray(lab.tests)?lab.tests.length:lab.tests}</strong> tests</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm" onclick="toggleLab(${lab.id})"
            style="background:${lab.active?'#FEF2F2':'#F0FDF4'};color:${lab.active?'#DC2626':'#15803D'};border:none;font-weight:600">
            ${lab.active?'Deactivate':'Activate'}
          </button>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── Main render ──────────────────────────────────────────────────────────────
function render(){
  const root = document.getElementById('root');
  if(!state.authed){
    root.innerHTML = pageLogin();
    setTimeout(()=>{ const el=document.getElementById('u'); if(el)el.focus(); },50);
    return;
  }
  let content = '';
  if(state.page==='dashboard') content = pageDashboard();
  else if(state.page==='bookings') content = pageBookings();
  else if(state.page==='labs') content = pageLabs();

  root.innerHTML = `<div>${sidebar()}<div class="main">${topbar()}${content}</div></div>`;
}
setRender(render);

// ── Actions ──────────────────────────────────────────────────────────────────
window.go = function(p){ state.page=p; state.search=''; state.statusFilter='All'; render(); };
window.doLogin = function(e){
  e.preventDefault();
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value.trim();
  if(u==='admin' && p==='labease2024'){
    localStorage.setItem('le_auth','1');
    state.authed = true; render();
  } else {
    const el = document.getElementById('lerr');
    el.style.display='block'; el.textContent='Invalid credentials. Use admin / labease2024';
  }
};
window.doLogout = function(){ localStorage.removeItem('le_auth'); state.authed=false; render(); };
window.refreshBookings = function(){ state.bookings=loadBookings(); render(); };
window.setSearch = function(v){ state.search=v; render(); };
window.setStatusFilter = function(v){ state.statusFilter=v; render(); };
window.updateStatus = function(id,status){
  state.bookings = state.bookings.map(b=>b.id===id?{...b,status}:b);
  saveBookings(); render();
};
window.toggleLab = function(id){
  state.labs = state.labs.map(l=>l.id===id?{...l,active:!l.active}:l);
  saveLabs();
  const lo={}; try{Object.assign(lo,JSON.parse(localStorage.getItem('le_lab_overrides')||'{}'));}catch(e){}
  const lab=state.labs.find(l=>l.id===id); if(lab) lo[id]=lab.active;
  localStorage.setItem('le_lab_overrides',JSON.stringify(lo));
  render();
};
window.dlBookings = function(){
  const q=(state.search||'').toLowerCase(), f=state.statusFilter||'All';
  const rows = state.bookings.filter(b=>{
    const mq=!q||(b.patient||'').toLowerCase().includes(q)||(b.id||'').toLowerCase().includes(q)||(b.test||'').toLowerCase().includes(q);
    return mq&&(f==='All'||b.status===f);
  });
  const headers = ['Booking ID','Patient Name','Phone','Test','Lab','Date','Mode','Amount','Status'];
  const csv = [headers.join(','), ...rows.map(b=>[b.id,b.patient,b.phone,`"${(b.test||'').replace(/"/g,'""')}"`,b.lab,b.date,b.mode,b.amount,b.status].join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='LabEase_Bookings_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
};

// ── Listen for new bookings from main app ────────────────────────────────────
window.addEventListener('storage', e=>{
  if(e.key==='le_bookings' && state.authed){
    try{ state.bookings=JSON.parse(e.newValue||'[]'); render(); }catch(ex){}
  }
});
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden && state.authed){ state.bookings=loadBookings(); render(); }
});

// ── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
