  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: #1158A6; color: #fff; }
  .btn-primary:hover { background: #0F4A8A; }
  .btn-outline { background: #fff; color: #374151; border: 1px solid #E5E7EB; }

  .btn-sm { padding: 5px 11px; font-size: 12px; }
  input[type=text], input[type=password], input[type=number], select { border: 1px solid #E5E7EB; border-radius: 8px; padding: 8px 12px; font-size: 13.5px; outline: none; transition: border .15s; background: #fff; color: #111827; }

  .progress-bar { height: 6px; border-radius: 3px; background: #E5E7EB; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .pill-btn { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid #E5E7EB; background: #fff; color: #6B7280; transition: all .15s; }
  .pill-btn.active { background: #1158A6; color: #fff; border-color: #1158A6; }

  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0D1117 0%, #161B22 100%); }

function genBookings() {
  const saved = localStorage.getItem('le_bookings');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      // Remove old auto-generated demo entries (IDs LB1000–LB1027)
      const real = data.filter(b => !/^LB10[012]\d$/.test(b.id));
      if (real.length !== data.length) {
        localStorage.setItem('le_bookings', JSON.stringify(real));
        return real;
      }
      return data;
    } catch(e) {}
  }
  return [];
}

function genLabs() {

  localStorage.setItem('le_labs', JSON.stringify(data));
  return data;
}

  var overrides={};
  try{overrides=JSON.parse(localStorage.getItem('le_price_overrides')||'{}');}catch(e){}
  return ALL_LAB_TESTS.map(t => { var ov=overrides[t.id]||{}; return Object.assign({},t,{price:ov.price!==undefined?ov.price:t.price,mrp:ov.mrp!==undefined?ov.mrp:t.mrp}); });
}

function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN'); }
function statusBadgeClass(s) {
  if(s==='Confirmed') return 'badge badge-blue';
  if(s==='Sample Collected') return 'badge badge-yellow';
  if(s==='Report Ready') return 'badge badge-green';
  if(s==='Cancelled') return 'badge badge-red';
  return 'badge badge-grey';
}

// Login
function Login({onLogin}) {
  const [user,setUser]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  function submit(e) {
    e.preventDefault();
    if(user.trim()==='admin'&&pass.trim()==='labease2024'){onLogin();}
    else setErr('Invalid credentials. Use admin / labease2024');
  }
  return html`
    <div class="login-wrap">
      <div class="login-card">
        <div style="text-align:center;margin-bottom:28px">
          <div style="font-family:'DM Serif Display';font-size:34px;color:#0D1117;letter-spacing:-0.5px">LabEase</div>
          <div style="color:#6B7280;font-size:13px;margin-top:4px;font-weight:500">Admin Panel — Sign in to continue</div>
        </div>
        <form onSubmit=${submit}>
          <div style="margin-bottom:14px">
            <label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px">Username</label>
            <input type="text" style="width:100%" value=${user} onInput=${e=>setUser(e.target.value)} placeholder="admin" autoFocus />
          </div>
          <div style="margin-bottom:18px">
            <label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px">Password</label>
            <input type="password" style="width:100%" value=${pass} onInput=${e=>setPass(e.target.value)} placeholder="••••••••" />
          </div>
          ${err&&html`<div style="background:#FEF2F2;color:#DC2626;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:14px;font-weight:500">${err}</div>`}
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px">Sign In</button>
          <div style="text-align:center;margin-top:14px;font-size:12px;color:#9CA3AF">Default: <strong>admin</strong> / <strong>labease2024</strong></div>
        </form>
      </div>
    </div>`;
}

  ];
  return html`
    <div class="sidebar">
      <div style="padding:24px 16px 12px">
        <div style="font-family:'DM Serif Display';font-size:28px;color:#fff;letter-spacing:-0.3px">LabEase</div>
        <div style="font-size:11px;color:#6B7280;font-weight:500;margin-top:2px;letter-spacing:0.06em;text-transform:uppercase">Admin Panel</div>
      </div>
      <div style="height:1px;background:#161B22;margin:8px 16px"/>
      <nav style="flex:1;padding:8px 0">
        ${items.map(it=>html`
          <div key=${it.key} class=${'nav-item'+(page===it.key?' active':'')} onClick=${()=>setPage(it.key)}>
            ${it.icon}<span>${it.label}</span>

      </nav>
      <div style="padding:12px 8px 24px">
        <div class="nav-item" onClick=${onLogout} style="color:#EF4444"><${IconLogout}/><span>Logout</span></div>
      </div>
    </div>`;
}

// Dashboard
function Dashboard({bookings,setBookings}) {
  const total=bookings.length;
  const active=bookings.filter(b=>b.status==='Confirmed'||b.status==='Sample Collected').length;
  const revenue=bookings.filter(b=>b.status!=='Cancelled').reduce((s,b)=>s+b.amount,0);
  const sc={};STATUSES.forEach(s=>{sc[s]=bookings.filter(b=>b.status===s).length;});
  const tc={};bookings.forEach(b=>{tc[b.test]=(tc[b.test]||0)+1;});
  const topTests=Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxT=topTests.length>0?topTests[0][1]:1;
  const recent=bookings.slice().sort((a,b)=>b.id.localeCompare(a.id)).slice(0,6);
  const scol={'Confirmed':'#3B82F6','Sample Collected':'#F59E0B','Report Ready':'#10B981','Pending':'#9CA3AF','Cancelled':'#EF4444'};
  const stats=[
    {label:'Total Bookings',value:total,bg:'#EFF6FF',emoji:'📋'},
    {label:'Active Bookings',value:active,bg:'#F0FDF4',emoji:'✅'},
    {label:'Total Revenue',value:fmt(revenue),bg:'#FFF7ED',emoji:'💰'},
    {label:'Total Labs',value:LAB_NAMES.length,bg:'#FDF4FF',emoji:'🏥'},
  ];
  return html`
    <div style="padding:28px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:22px;font-weight:800;color:#0D1117">Dashboard</div>
        <button class="btn btn-outline btn-sm" onClick=${()=>{try{const s=localStorage.getItem('le_bookings');if(s)setBookings(JSON.parse(s));}catch(e){}}} style="font-size:12px">↻ Refresh</button>
      </div>
      <div style="font-size:13.5px;color:#6B7280;margin-bottom:24px">Welcome back, Admin. Here's what's happening today.</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
        ${stats.map(s=>html`
          <div key=${s.label} class="card" style="padding:20px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div>
                <div style="font-size:12px;color:#6B7280;font-weight:600;margin-bottom:6px">${s.label}</div>
                <div style="font-size:26px;font-weight:800;color:#0D1117">${s.value}</div>
              </div>
              <div style="width:44px;height:44px;border-radius:12px;background:${s.bg};display:flex;align-items:center;justify-content:center;font-size:20px">${s.emoji}</div>
            </div>
          </div>`)}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
        <div class="card" style="padding:22px">
          <div style="font-weight:700;font-size:15px;margin-bottom:18px;color:#0D1117">Booking Status Breakdown</div>
          ${STATUSES.map(s=>html`
            <div key=${s} style="margin-bottom:14px">
              <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:500;margin-bottom:5px">
                <span>${s}</span><span style="color:#6B7280">${sc[s]}</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${total?((sc[s]/total)*100):0}%;background:${scol[s]}"/></div>
            </div>`)}
        </div>
        <div class="card" style="padding:22px">
          <div style="font-weight:700;font-size:15px;margin-bottom:18px;color:#0D1117">Top 5 Booked Tests</div>
          ${topTests.map(([name,cnt],i)=>html`
            <div key=${name} style="margin-bottom:14px">
              <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:500;margin-bottom:5px">
                <span>${(i+1)+'. '+name}</span><span style="color:#6B7280">${cnt} bookings</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${((cnt/maxT)*100)}%;background:#1158A6"/></div>
            </div>`)}
        </div>
      </div>
      <div class="card">
        <div style="padding:18px 20px 0;font-weight:700;font-size:15px;color:#0D1117">Recent Bookings</div>
        ${recent.length===0?html`<div style="padding:40px;text-align:center;color:#9CA3AF;font-size:13.5px">No bookings yet. Bookings from patients will appear here automatically.</div>`:html`
        <table>
          <thead><tr><th>ID</th><th>Patient</th><th>Test</th><th>Lab</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody>
            ${recent.map(b=>html`
              <tr key=${b.id}>
                <td style="font-weight:600;color:#1158A6">${b.id}</td>
                <td>${b.patient}</td><td>${b.test}</td><td>${b.lab}</td><td>${b.date}</td>
                <td style="font-weight:600">${fmt(b.amount)}</td>
                <td><span class=${statusBadgeClass(b.status)}>${b.status}</span></td>
              </tr>`)}
          </tbody>
        </table>`}
      </div>
    </div>`;
}

// Bookings
function Bookings({bookings,setBookings}) {
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('All');
  function dlXlsx(rows){
    var data=rows.map(b=>({'Booking ID':b.id,'Patient Name':b.patient,'Phone':b.phone,'Test':b.test,'Lab':b.lab,'Date':b.date,'Mode':b.mode,'Amount (₹)':b.amount,'Status':b.status}));
    var ws=XLSX.utils.json_to_sheet(data),wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Bookings');
    XLSX.writeFile(wb,'LabEase_Bookings_'+new Date().toISOString().slice(0,10)+'.xlsx');
  }
  function updateStatus(id,status){
    var next=bookings.map(b=>b.id===id?Object.assign({},b,{status}):b);
    setBookings(next);localStorage.setItem('le_bookings',JSON.stringify(next));
  }
  var filtered=bookings.filter(b=>{
    var q=search.toLowerCase();
    var mq=!q||b.patient.toLowerCase().includes(q)||b.id.toLowerCase().includes(q)||b.test.toLowerCase().includes(q);
    var mf=filter==='All'||b.status===filter;
    return mq&&mf;
  }).sort((a,b)=>b.id.localeCompare(a.id));
  return html`
    <div style="padding:28px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div style="font-size:22px;font-weight:800;color:#0D1117">Bookings</div>
        <button class="btn btn-outline" onClick=${()=>dlXlsx(filtered)}><${IconDownload}/> Download Excel</button>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
        <div style="position:relative;flex:1;min-width:220px">
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9CA3AF"><${IconSearch}/></span>
          <input type="text" style="width:100%;padding-left:32px" placeholder="Search by name, ID or test…" value=${search} onInput=${e=>setSearch(e.target.value)} />
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${['All'].concat(STATUSES).map(s=>html`<button key=${s} class=${'pill-btn'+(filter===s?' active':'')} onClick=${()=>setFilter(s)}>${s}</button>`)}
        </div>
      </div>
      <div class="card" style="overflow:hidden">
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>ID</th><th>Patient</th><th>Phone</th><th>Test</th><th>Lab</th><th>Date</th><th>Mode</th><th>Amount</th><th>Status</th><th>Update Status</th></tr></thead>
            <tbody>
              ${filtered.length===0&&html`<tr><td colSpan=10 style="text-align:center;color:#9CA3AF;padding:32px">No bookings found.</td></tr>`}
              ${filtered.map(b=>html`
                <tr key=${b.id}>
                  <td style="font-weight:600;color:#1158A6">${b.id}</td>
                  <td style="font-weight:600">${b.patient}</td>
                  <td style="color:#6B7280">${b.phone}</td>
                  <td>${b.test}</td><td>${b.lab}</td><td>${b.date}</td>
                  <td><span style="font-size:12px;font-weight:600;color:${b.mode==='Home'?'#7E22CE':'#0369A1'};background:${b.mode==='Home'?'#FDF4FF':'#F0F9FF'};padding:3px 8px;border-radius:6px">${b.mode}</span></td>
                  <td style="font-weight:700">${fmt(b.amount)}</td>
                  <td><span class=${statusBadgeClass(b.status)}>${b.status}</span></td>
                  <td>
                    <select value=${b.status} onChange=${e=>updateStatus(b.id,e.target.value)} style="font-size:12px;padding:5px 8px">
                      ${STATUSES.map(s=>html`<option key=${s} value=${s}>${s}</option>`)}
                    </select>
                  </td>
                </tr>`)}
            </tbody>
          </table>
        </div>
        <div style="padding:12px 20px;font-size:12px;color:#9CA3AF;border-top:1px solid #F3F4F6">
          Showing ${filtered.length} of ${bookings.length} bookings
        </div>
      </div>
    </div>`;
}

// Labs
function Labs({labs,setLabs}) {
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({});
  const [editTests,setEditTests]=useState([]);
  const [addingLab,setAddingLab]=useState(false);
  const [newLab,setNewLab]=useState({name:'',city:'',phone:'',rating:'4.5',address:'',timing:'',reportTime:'Same Day',homeCollection:false,nabl:false,logoBase64:'',color:'#1158A6'});
  const [newLabTests,setNewLabTests]=useState([{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]);

  function startEdit(lab){
    setEditing(lab.id);
    setForm({name:lab.name,city:lab.city||'',phone:lab.phone||'',rating:lab.rating||'4.5',address:lab.address||'',timing:lab.timing||'',homeCollection:!!lab.homeCollection,nabl:!!lab.nabl,color:lab.color||'#1158A6',logoBase64:lab.logoBase64||''});
    var t=Array.isArray(lab.tests)?lab.tests.map(t=>({name:t.name,price:t.price,mrp:t.mrp,cat:t.cat||'General',time:t.time||'Same Day'})):[];
    setEditTests(t.length?t:[{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]);
  }
  function saveEdit(id){
    var ta=editTests.filter(t=>t.name&&t.name.trim()).map((t,i)=>({id:'x'+id+'_'+i,name:t.name.trim(),price:parseFloat(t.price)||0,mrp:parseFloat(t.mrp)||parseFloat(t.price)||0,cat:t.cat||'General',time:t.time||'Same Day'}));
    var next=labs.map(l=>l.id===id?Object.assign({},l,form,{rating:parseFloat(form.rating)||4.5,tests:ta.length?ta:l.tests}):l);
    setLabs(next);localStorage.setItem('le_labs',JSON.stringify(next));
    var extras=[];try{extras=JSON.parse(localStorage.getItem('le_extra_labs')||'[]');}catch(e){}
    var upd=next.find(l=>l.id===id);var ki=new Set([1,2,3,4,5,6]);
    if(!ki.has(id)&&upd){extras=extras.map(e=>e.id===id?upd:e);localStorage.setItem('le_extra_labs',JSON.stringify(extras));}
    var lnov={};try{lnov=JSON.parse(localStorage.getItem('le_lab_name_overrides')||'{}');}catch(e){}
    lnov[id]=form.name;localStorage.setItem('le_lab_name_overrides',JSON.stringify(lnov));
    setEditing(null);
  }
  function toggle(id){
    var next=labs.map(l=>l.id===id?Object.assign({},l,{active:!l.active}):l);
    setLabs(next);localStorage.setItem('le_labs',JSON.stringify(next));
    var tog=next.find(l=>l.id===id);
    if(tog){var lo={};try{lo=JSON.parse(localStorage.getItem('le_lab_overrides')||'{}');}catch(e){}lo[id]=tog.active;localStorage.setItem('le_lab_overrides',JSON.stringify(lo));}
  }
  function saveNewLab(){
    if(!newLab.name.trim())return;
    var maxId=labs.reduce((m,l)=>Math.max(m,l.id),0),labId=maxId+1;
    var ta=newLabTests.filter(t=>t.name.trim()).map((t,i)=>({id:'x'+labId+'_'+i,name:t.name.trim(),price:parseFloat(t.price)||199,mrp:parseFloat(t.mrp)||parseFloat(t.price)||199,cat:t.cat||'General',time:t.time||'Same Day'}));
    if(!ta.length)ta=[{id:'x'+labId+'_0',name:'Consultation',price:199,mrp:499,cat:'General',time:'Same Day'}];
    var lab={id:labId,name:newLab.name.trim(),city:newLab.city.trim(),address:newLab.address.trim()||newLab.city.trim(),phone:newLab.phone.trim(),rating:parseFloat(newLab.rating)||4.5,reviews:0,timing:newLab.timing.trim()||'6:00 AM – 10:00 PM',reportTime:newLab.reportTime||'Same Day',homeCollection:newLab.homeCollection,nabl:newLab.nabl,color:newLab.color||'#1158A6',logoBase64:newLab.logoBase64||'',tests:ta,active:true,distance:'—',founded:new Date().getFullYear().toString()};
    var next=labs.concat([lab]);setLabs(next);localStorage.setItem('le_labs',JSON.stringify(next));
    var extras=[];try{extras=JSON.parse(localStorage.getItem('le_extra_labs')||'[]');}catch(e){}
    extras.push(lab);localStorage.setItem('le_extra_labs',JSON.stringify(extras));
    setNewLab({name:'',city:'',phone:'',rating:'4.5',address:'',timing:'',reportTime:'Same Day',homeCollection:false,nabl:false,logoBase64:'',color:'#1158A6'});
    setNewLabTests([{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]);
    setAddingLab(false);
  }
  function readImg(e,cb){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=ev=>cb(ev.target.result);r.readAsDataURL(file);}
  const nlFields=[['name','Lab Name'],['city','City'],['phone','Phone'],['rating','Rating'],['address','Address'],['timing','Timing (e.g. 6:00 AM – 10:00 PM)'],['color','Button Color']];
  const edFields=[['name','Lab Name'],['city','City'],['phone','Phone'],['rating','Rating'],['address','Address'],['timing','Timing'],['color','Button Color']];
  const testRow=(t,i,setFn)=>html`
    <div key=${i} style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:6px;margin-bottom:5px;align-items:center">
      <input type="text" placeholder="e.g. CBC" style="width:100%" value=${t.name} onInput=${e=>{var v=e.target.value;setFn(a=>{var n=a.slice();n[i]=Object.assign({},n[i],{name:v});return n;});}} />
      <input type="number" placeholder="0" style="width:100%" value=${t.price} onInput=${e=>{var v=e.target.value;setFn(a=>{var n=a.slice();n[i]=Object.assign({},n[i],{price:v});return n;});}} />
      <input type="number" placeholder="0" style="width:100%" value=${t.mrp} onInput=${e=>{var v=e.target.value;setFn(a=>{var n=a.slice();n[i]=Object.assign({},n[i],{mrp:v});return n;});}} />
      <select style="width:100%;height:32px;border-radius:6px;border:1px solid #D1D5DB;font-size:12px;padding:0 4px" value=${t.cat} onChange=${e=>{var v=e.target.value;setFn(a=>{var n=a.slice();n[i]=Object.assign({},n[i],{cat:v});return n;});}}>
        ${CAT_OPTIONS.map(c=>html`<option key=${c} value=${c}>${c}</option>`)}
      </select>
      <button style="background:#FEE2E2;color:#DC2626;border:none;border-radius:5px;padding:3px 7px;cursor:pointer;font-weight:700;font-size:12px" onClick=${()=>setFn(a=>a.filter((_,j)=>j!==i))}>✕</button>
    </div>`;
  return html`
    <div style="padding:28px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div style="font-size:22px;font-weight:800;color:#0D1117">Labs</div>
        <button class="btn btn-primary" onClick=${()=>setAddingLab(!addingLab)}>+ Add Lab</button>
      </div>
      ${addingLab&&html`
        <div class="card" style="padding:20px;margin-bottom:20px">
          <div style="font-weight:700;font-size:15px;margin-bottom:14px;color:#0D1117">Add New Lab</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px">
            ${nlFields.map(([k,lbl])=>html`
              <div key=${k}>
                <label style="font-size:11px;font-weight:600;color:#6B7280;display:block;margin-bottom:3px">${lbl}</label>
                <input type="text" style="width:100%" value=${newLab[k]} onInput=${e=>{var v=e.target.value;setNewLab(f=>Object.assign({},f,{[k]:v}));}} />
              </div>`)}
            <div>
              <label style="font-size:11px;font-weight:600;color:#6B7280;display:block;margin-bottom:3px">Logo (upload image)</label>
              <input type="file" accept="image/*" style="width:100%;font-size:12px" onChange=${e=>readImg(e,v=>setNewLab(f=>Object.assign({},f,{logoBase64:v})))} />
              ${newLab.logoBase64&&html`<img src=${newLab.logoBase64} alt="preview" style="width:48px;height:48px;object-fit:contain;margin-top:4px;border-radius:6px;border:1px solid #E5E7EB"/>`}
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <input type="checkbox" id="nl-hc" checked=${newLab.homeCollection} onChange=${e=>{var v=e.target.checked;setNewLab(f=>Object.assign({},f,{homeCollection:v}));}} />
              <label for="nl-hc" style="font-size:13px;font-weight:600;color:#374151">Home Collection</label>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <input type="checkbox" id="nl-nabl" checked=${newLab.nabl} onChange=${e=>{var v=e.target.checked;setNewLab(f=>Object.assign({},f,{nabl:v}));}} />
              <label for="nl-nabl" style="font-size:13px;font-weight:600;color:#374151">NABL Accredited</label>
            </div>
            <div>
              <label style="font-size:11px;font-weight:600;color:#6B7280;display:block;margin-bottom:3px">Reports Ready In</label>
              <select style="width:100%;height:34px;border-radius:6px;border:1px solid #D1D5DB;font-size:12px;padding:0 6px" value=${newLab.reportTime} onChange=${e=>{var v=e.target.value;setNewLab(f=>Object.assign({},f,{reportTime:v}));}}>
                ${REPORT_OPTIONS.map(r=>html`<option key=${r} value=${r}>${r}</option>`)}
              </select>
            </div>
          </div>
          <div style="margin-bottom:14px">
            <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:4px">Tests / Packages</div>
            <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:3px">
              <span style="font-size:10px;font-weight:600;color:#9CA3AF">Test Name</span>
              <span style="font-size:10px;font-weight:600;color:#9CA3AF">Price (₹)</span>
              <span style="font-size:10px;font-weight:600;color:#9CA3AF">MRP (₹)</span>
              <span style="font-size:10px;font-weight:600;color:#9CA3AF">Category</span><span/>
            </div>
            ${newLabTests.map((t,i)=>testRow(t,i,setNewLabTests))}
            <button class="btn btn-outline btn-sm" onClick=${()=>setNewLabTests(a=>a.concat([{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]))}>+ Add Test</button>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onClick=${saveNewLab}>Save Lab</button>
            <button class="btn btn-outline btn-sm" onClick=${()=>setAddingLab(false)}>Cancel</button>
          </div>
        </div>`}
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">
        ${labs.map(lab=>html`
          <div key=${lab.id} class="lab-card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
              <div style="font-weight:700;font-size:15px;color:#0D1117;flex:1;padding-right:8px">${lab.name}</div>
              <span class=${'badge '+(lab.active?'badge-green':'badge-red')} style="flex-shrink:0">${lab.active?'Active':'Inactive'}</span>
            </div>
            ${editing===lab.id?html`
              <div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
                  ${edFields.map(([k,lbl])=>html`
                    <div key=${k}>
                      <label style="font-size:10px;font-weight:600;color:#6B7280;display:block;margin-bottom:2px">${lbl}</label>
                      <input type="text" style="width:100%" value=${form[k]||''} onInput=${e=>{var v=e.target.value;setForm(f=>Object.assign({},f,{[k]:v}));}} />
                    </div>`)}
                  <div>
                    <label style="font-size:10px;font-weight:600;color:#6B7280;display:block;margin-bottom:2px">Logo (upload)</label>
                    <input type="file" accept="image/*" style="width:100%;font-size:11px" onChange=${e=>readImg(e,v=>setForm(f=>Object.assign({},f,{logoBase64:v})))} />
                    ${form.logoBase64&&html`<img src=${form.logoBase64} alt="logo" style="width:36px;height:36px;object-fit:contain;margin-top:3px;border-radius:4px;border:1px solid #E5E7EB"/>`}
                  </div>
                </div>
                <div style="display:flex;gap:16px;margin-bottom:8px">
                  <label style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;cursor:pointer">
                    <input type="checkbox" checked=${!!form.homeCollection} onChange=${e=>{var v=e.target.checked;setForm(f=>Object.assign({},f,{homeCollection:v}));}} /> Home Collection
                  </label>
                  <label style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;cursor:pointer">
                    <input type="checkbox" checked=${!!form.nabl} onChange=${e=>{var v=e.target.checked;setForm(f=>Object.assign({},f,{nabl:v}));}} /> NABL Accredited
                  </label>
                </div>
                <div style="margin-bottom:8px">
                  <div style="font-size:11px;font-weight:700;color:#374151;margin-bottom:4px">Tests / Packages</div>
                  <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:6px;margin-bottom:3px">
                    <span style="font-size:10px;font-weight:600;color:#9CA3AF">Test Name</span>
                    <span style="font-size:10px;font-weight:600;color:#9CA3AF">Price (₹)</span>
                    <span style="font-size:10px;font-weight:600;color:#9CA3AF">MRP (₹)</span>
                    <span style="font-size:10px;font-weight:600;color:#9CA3AF">Category</span><span/>
                  </div>
                  ${editTests.map((t,i)=>testRow(t,i,setEditTests))}
                  <button class="btn btn-outline btn-sm" onClick=${()=>setEditTests(a=>a.concat([{name:'',price:'',mrp:'',cat:'Blood',time:'Same Day'}]))}>+ Add Test</button>
                </div>
                <div style="display:flex;gap:8px;margin-top:10px">
                  <button class="btn btn-primary btn-sm" onClick=${()=>saveEdit(lab.id)}>Save</button>
                  <button class="btn btn-outline btn-sm" onClick=${()=>setEditing(null)}>Cancel</button>
                </div>
              </div>`:html`
              <div>
                <div style="color:#6B7280;font-size:13px;margin-bottom:4px">📍 ${lab.city}</div>
                <div style="color:#6B7280;font-size:13px;margin-bottom:4px">📞 ${lab.phone}</div>
                <div style="display:flex;gap:16px;margin-bottom:14px;margin-top:10px">
                  <div style="font-size:13px">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1" style="vertical-align:middle"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    ${' '}<span style="font-weight:600">${lab.rating}</span> <span style="color:#9CA3AF">rating</span>
                  </div>
                  <div style="font-size:13px;color:#6B7280"><strong style="color:#0D1117">${Array.isArray(lab.tests)?lab.tests.length:lab.tests}</strong> tests</div>
                </div>
                <div style="display:flex;gap:8px">
                  <button class="btn btn-outline btn-sm" onClick=${()=>startEdit(lab)}><${IconEdit}/> Edit</button>
                  <button class="btn btn-sm" onClick=${()=>toggle(lab.id)} style="background:${lab.active?'#FEF2F2':'#F0FDF4'};color:${lab.active?'#DC2626':'#15803D'};border:none;font-weight:600">
                    ${lab.active?'Deactivate':'Activate'}
                  </button>
                </div>
              </div>`}
          </div>`)}
      </div>
    </div>`;
}

// Tests
function Tests({tests,setTests}) {
  const [search,setSearch]=useState('');
  const [labFilter,setLabFilter]=useState('All');
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({});
  const labNames=['All','Apollo','SRL','Metropolis','Dr Lal','Thyrocare','Vijaya'];
  function startEdit(t){setEditing(t.id);setForm({mrp:t.mrp,price:t.price,name:t.name});}
  function saveEdit(id){
    var np=parseInt(form.price),nm=parseInt(form.mrp),nn=form.name;
    var next=tests.map(t=>t.id===id?Object.assign({},t,{price:np,mrp:nm,name:nn}):t);
    setTests(next);
    var ov={};try{ov=JSON.parse(localStorage.getItem('le_price_overrides')||'{}');}catch(e){}
    ov[id]={price:np,mrp:nm};localStorage.setItem('le_price_overrides',JSON.stringify(ov));
    var tnov={};try{tnov=JSON.parse(localStorage.getItem('le_test_name_overrides')||'{}');}catch(e){}
    tnov[id]=nn;localStorage.setItem('le_test_name_overrides',JSON.stringify(tnov));
    setEditing(null);
  }
  var filtered=tests.filter(t=>{
    var mq=!search||t.name.toLowerCase().includes(search.toLowerCase())||t.cat.toLowerCase().includes(search.toLowerCase());
    var ml=labFilter==='All'||t.lab===labFilter;
    return mq&&ml;
  });
  return html`
    <div style="padding:28px">
      <div style="font-size:22px;font-weight:800;margin-bottom:6px;color:#0D1117">Tests & Pricing</div>
      <div style="color:#6B7280;font-size:13px;margin-bottom:20px">Edit prices per lab — changes reflect instantly in the main app</div>
      <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
        <div style="position:relative;width:280px">
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9CA3AF"><${IconSearch}/></span>
          <input type="text" style="width:100%;padding-left:32px" placeholder="Search test or category…" value=${search} onInput=${e=>setSearch(e.target.value)} />
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${labNames.map(l=>html`<button key=${l} class=${'btn '+(labFilter===l?'btn-primary':'btn-outline')+' btn-sm'} onClick=${()=>setLabFilter(l)}>${l}</button>`)}
        </div>
      </div>
      <div style="color:#6B7280;font-size:12px;margin-bottom:10px">${filtered.length} entries</div>
      <div class="card" style="overflow:hidden">
        <table>
          <thead><tr><th>Test Name</th><th>Lab</th><th>Category</th><th>MRP</th><th>Offer Price</th><th>Discount</th><th>Action</th></tr></thead>
          <tbody>
            ${filtered.map(t=>{
              var disc=Math.round((1-t.price/t.mrp)*100);
              return html`
                <tr key=${t.id}>
                  <td style="font-weight:600;max-width:180px">${t.name}</td>
                  <td><span style="font-size:12px;background:#EFF6FF;color:#1158A6;padding:3px 8px;border-radius:6px;font-weight:600;white-space:nowrap">${t.lab}</span></td>
                  <td><span style="font-size:12px;background:#F3F4F6;color:#374151;padding:3px 8px;border-radius:6px;font-weight:600">${t.cat}</span></td>
                  <td style="color:#9CA3AF;text-decoration:line-through">${fmt(t.mrp)}</td>
                  <td style="font-weight:700;color:#15803D">${fmt(t.price)}</td>
                  <td><span style="background:#FFF7ED;color:#C2410C;font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px">${disc}% off</span></td>
                  <td>
                    ${editing===t.id?html`
                      <div style="display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap">
                        <div>
                          <div style="font-size:11px;color:#9CA3AF;margin-bottom:2px">Test Name</div>
                          <input type="text" style="width:160px;padding:4px 8px;font-size:12px" value=${form.name} onInput=${e=>{var v=e.target.value;setForm(f=>Object.assign({},f,{name:v}));}} />
                        </div>
                        <div>
                          <div style="font-size:11px;color:#9CA3AF;margin-bottom:2px">MRP</div>
                          <input type="number" style="width:76px;padding:4px 8px;font-size:12px" value=${form.mrp} onInput=${e=>{var v=e.target.value;setForm(f=>Object.assign({},f,{mrp:v}));}} />
                        </div>
                        <div>
                          <div style="font-size:11px;color:#9CA3AF;margin-bottom:2px">Price</div>
                          <input type="number" style="width:76px;padding:4px 8px;font-size:12px" value=${form.price} onInput=${e=>{var v=e.target.value;setForm(f=>Object.assign({},f,{price:v}));}} />
                        </div>
                        <div style="display:flex;gap:5px">
                          <button class="btn btn-primary btn-sm" onClick=${()=>saveEdit(t.id)}>Save</button>
                          <button class="btn btn-outline btn-sm" onClick=${()=>setEditing(null)}>✕</button>
                        </div>
                      </div>`:html`
                      <button class="btn btn-outline btn-sm" onClick=${()=>startEdit(t)}><${IconEdit}/> Edit Price</button>`}
                  </td>
                </tr>`;
            })}
          </tbody>
        </table>
      </div>
    </div>`;
}

// App
function App() {
  const [authed,setAuthed]=useState(()=>localStorage.getItem('le_auth')==='1');
  const [page,setPage]=useState('dashboard');
  const [bookings,setBookings]=useState(()=>genBookings());
  const [labs,setLabs]=useState(()=>genLabs());
  const [tests,setTests]=useState(()=>genTests());

  useEffect(()=>{
    function handler(e){if(e.key==='le_bookings'){try{setBookings(JSON.parse(e.newValue||'[]'));}catch(ex){}}}
    function onFocus(){try{const s=localStorage.getItem('le_bookings');if(s)setBookings(JSON.parse(s));}catch(e){}}
    window.addEventListener('storage',handler);
    document.addEventListener('visibilitychange',()=>{if(!document.hidden)onFocus();});
    return ()=>window.removeEventListener('storage',handler);
  },[]);

  function login(){['le_admin_auth','labease_admin_auth'].forEach(k=>localStorage.removeItem(k));localStorage.setItem('le_auth','1');setAuthed(true);}
  function logout(){localStorage.removeItem('le_auth');setAuthed(false);}

  if(!authed)return html`<${Login} onLogin=${login}/>`;
  const pt={dashboard:'Dashboard',bookings:'Bookings',labs:'Labs',tests:'Tests & Pricing'};
  return html`
    <div>
      <${Sidebar} page=${page} setPage=${setPage} onLogout=${logout}/>
      <div class="main">
        <div class="top-bar">
          <div style="font-weight:700;font-size:15px;color:#0D1117">${pt[page]}</div>
          <div style="font-size:13px;color:#6B7280;display:flex;align-items:center;gap:8px">
            <div style="width:32px;height:32px;border-radius:50%;background:#1158A6;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px">A</div>
            <span style="font-weight:500">Admin</span>
          </div>
        </div>
        ${page==='dashboard'&&html`<${Dashboard} bookings=${bookings} setBookings=${setBookings}/>`}
        ${page==='bookings'&&html`<${Bookings} bookings=${bookings} setBookings=${setBookings}/>`}
        ${page==='labs'&&html`<${Labs} labs=${labs} setLabs=${setLabs}/>`}
        ${page==='tests'&&html`<${Tests} tests=${tests} setTests=${setTests}/>`}
      </div>
    </div>`;
}

render(h(App,null),document.getElementById('root'));
</script>
</body>
</html>
